<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Drift Arrow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #0a0014; touch-action: none;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <script>
    'use strict';

    // ============================================================
    // CONFIG
    // ============================================================
    const CFG = {
        ARROW_SPEED: 3.5,
        STEER_RATE: 0.014,          // slightly slower rotation for less dizziness
        STEER_MAX: 0.045,           // lower cap to prevent extreme spinning
        GRIP: 0.025,
        REALIGN_RATE: 0.04,
        DRIFT_DRAG_EXP: 2.0,
        DRIFT_DRAG_SCALE: 0.008,
        ARROW_LENGTH: 22,
        ARROW_WIDTH: 10,
        TRACK_WIDTH: 120,
        MIN_TRACK_WIDTH: 45,
        BRAKE_DECEL: 0.03,
        BRAKE_MIN_SPEED: 0.35,
        SEGMENT_LENGTH: 12,
        LOOK_AHEAD: 120,
        LOOK_BEHIND: 100,
        SPEED_RECOVERY: 0.012,
        SPEED_RECOVERY_RELEASE: 0.06,
        DIFFICULTY_RAMP: 0.00012,
        METERS_PER_SEGMENT: 0.03,   // 1/100 scale — arrow ≈10cm, km takes very long
        // Timer
        START_TIME: 30,
        TIME_TOKEN_VALUE: 3.5,
        TOKEN_RADIUS: 10,
    };

    // ============================================================
    // UTILS
    // ============================================================
    function lerp(a, b, t) { return a + (b - a) * t; }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function dist(x1, y1, x2, y2) { return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2); }

    // ============================================================
    // PROCEDURAL TRACK
    // ============================================================
    // Track pattern types for variety
    const PATTERN = {
        STRAIGHT: 0, CURVE: 1, CHICANE: 2, HAIRPIN: 3, SPIRAL: 4, SLALOM: 5
    };

    class Track {
        constructor() {
            this.spine = [];
            this.difficulty = 0;
            this.currentAngle = -Math.PI / 2;
            this.segmentIndex = 0;
            this.lastX = 0;
            this.lastY = 0;
            this.turnDir = 0;
            this.turnRemaining = 0;
            this.straightRemaining = 0;
            this.pattern = PATTERN.STRAIGHT;
            this.patternStep = 0;
            this.patternData = {};
        }

        init(startX, startY) {
            this.lastX = startX;
            this.lastY = startY;
            this.currentAngle = -Math.PI / 2;
            this.spine = [];
            this.segmentIndex = 0;
            this.difficulty = 0;
            this.backWall = null;
            this.startWall = null;
            this.straightRemaining = 20;
            this.turnRemaining = 0;
            this.pattern = PATTERN.STRAIGHT;
            this.patternStep = 0;
            this._cumAngle = 0;
            this._lastTurnDir = 0; // force alternation: next turn goes opposite

            for (let i = 0; i < CFG.LOOK_AHEAD + CFG.LOOK_BEHIND + 20; i++) {
                this.generateNext();
            }
        }

        _pickTurnDir() {
            // Force alternation: always turn opposite to last turn
            if (this._lastTurnDir !== 0) {
                const dir = -this._lastTurnDir;
                this._lastTurnDir = dir;
                return dir;
            }
            const dir = Math.random() < 0.5 ? -1 : 1;
            this._lastTurnDir = dir;
            return dir;
        }

        _pickPattern() {
            const d = this.difficulty;
            const r = Math.random();
            if (r < 0.06) {
                // Short straight breather (rare)
                this.pattern = PATTERN.STRAIGHT;
                this.straightRemaining = 3 + Math.floor(Math.random() * 5 * (1 - d * 0.5));
                this._lastTurnDir = 0;
            } else if (r < 0.25) {
                // S-curve chicane: alternating sharp turns
                this.pattern = PATTERN.CHICANE;
                this.patternData = {
                    turns: 2 + Math.floor(Math.random() * 3 + d * 3),
                    segsPerTurn: 5 + Math.floor(Math.random() * 8),
                    sharpness: 0.07 + d * 0.12,
                };
                this.turnDir = this._pickTurnDir();
                this.turnRemaining = this.patternData.segsPerTurn;
                this.patternStep = 0;
            } else if (r < 0.45) {
                // Hairpin: tight U-turn
                this.pattern = PATTERN.HAIRPIN;
                this.turnDir = this._pickTurnDir();
                this.turnRemaining = 10 + Math.floor(Math.random() * 16);
                this.patternData = { sharpness: 0.08 + d * 0.08, maxTotal: Math.PI * 0.7 };
                this.patternData.turned = 0;
            } else if (r < 0.62 && d > 0.15) {
                // Spiral: sustained turning that tightens
                this.pattern = PATTERN.SPIRAL;
                this.turnDir = this._pickTurnDir();
                this.turnRemaining = 14 + Math.floor(Math.random() * 18);
                this.patternData = { baseSharp: 0.035, ramp: 0.002 + d * 0.0025, maxTotal: Math.PI * 0.85 };
                this.patternData.turned = 0;
                this.patternStep = 0;
            } else if (r < 0.80 && d > 0.1) {
                // Slalom: rapid small wiggles
                this.pattern = PATTERN.SLALOM;
                this.patternData = {
                    freq: 0.2 + Math.random() * 0.18,
                    amp: 0.07 + d * 0.10,
                    length: 18 + Math.floor(Math.random() * 28),
                };
                this.turnRemaining = this.patternData.length;
                this.patternStep = 0;
            } else {
                // Normal curve
                this.pattern = PATTERN.CURVE;
                this.turnDir = this._pickTurnDir();
                this.turnRemaining = 10 + Math.floor(Math.random() * 18);
                this.patternData = { sharpness: 0.06 + d * 0.10, maxTotal: Math.PI * 0.6, turned: 0 };
            }
        }

        // Returns the minimum distance from (cx,cy) to any non-recent spine segment
        _minDistToOldTrack(cx, cy) {
            const recentThreshold = 60;
            const len = this.spine.length;
            if (len < recentThreshold) return Infinity;
            const checkEnd = len - recentThreshold;
            let minD2 = Infinity;
            for (let i = 0; i < checkEnd; i++) {
                const s = this.spine[i];
                const dx = cx - s.x;
                const dy = cy - s.y;
                const d2 = dx * dx + dy * dy;
                if (d2 < minD2) minD2 = d2;
            }
            return Math.sqrt(minD2);
        }

        // Check if candidate position would cause wall overlap with RECENT segments
        // (which are skipped by the distant-segment check)
        // Returns true if walls would overlap
        _wouldOverlapRecent(cx, cy, candWidth) {
            const skipLast = 10; // truly adjacent segments (always close)
            const checkWindow = 120; // check segments 10-120 back
            const len = this.spine.length;
            if (len < skipLast + 5) return false;
            const checkStart = Math.max(0, len - checkWindow);
            const checkEnd = len - skipLast;
            const margin = 15;
            for (let i = checkStart; i < checkEnd; i++) {
                const s = this.spine[i];
                const dx = cx - s.x;
                const dy = cy - s.y;
                const centerDist = Math.sqrt(dx * dx + dy * dy);
                const combinedHW = (candWidth + s.width) / 2;
                if (centerDist < combinedHW + margin) return true;
            }
            return false;
        }

        generateNext() {
            this.segmentIndex++;
            this.difficulty = Math.min(1, this.segmentIndex * CFG.DIFFICULTY_RAMP);
            const prevAngle = this.currentAngle;

            if (this.straightRemaining > 0) {
                this.straightRemaining--;
                this.currentAngle += (Math.random() - 0.5) * 0.01;
                // Decay cumulative angle during straights
                this._cumAngle *= 0.85;
            } else if (this.turnRemaining > 0) {
                this.turnRemaining--;
                this.patternStep++;

                switch (this.pattern) {
                    case PATTERN.CURVE: {
                        const cTurn = this.patternData.sharpness;
                        this.patternData.turned += cTurn;
                        if (this.patternData.turned > this.patternData.maxTotal) {
                            this.turnRemaining = 0;
                        } else {
                            this.currentAngle += this.turnDir * cTurn;
                        }
                        break;
                    }
                    case PATTERN.CHICANE:
                        this.currentAngle += this.turnDir * this.patternData.sharpness;
                        if (this.turnRemaining <= 0 && this.patternStep < this.patternData.turns) {
                            this.turnDir *= -1;
                            this.turnRemaining = this.patternData.segsPerTurn;
                            this.patternStep++;
                        }
                        break;
                    case PATTERN.HAIRPIN: {
                        const hTurn = this.patternData.sharpness;
                        this.patternData.turned += hTurn;
                        if (this.patternData.turned > this.patternData.maxTotal) {
                            this.turnRemaining = 0; // stop turning
                        } else {
                            this.currentAngle += this.turnDir * hTurn;
                        }
                        break;
                    }
                    case PATTERN.SPIRAL: {
                        const sharp = this.patternData.baseSharp + this.patternStep * this.patternData.ramp;
                        const sTurn = Math.min(sharp, 0.12);
                        this.patternData.turned += sTurn;
                        if (this.patternData.turned > this.patternData.maxTotal) {
                            this.turnRemaining = 0;
                        } else {
                            this.currentAngle += this.turnDir * sTurn;
                        }
                        break;
                    }
                    case PATTERN.SLALOM: {
                        const wave = Math.sin(this.patternStep * this.patternData.freq) * this.patternData.amp;
                        this.currentAngle += wave;
                        break;
                    }
                }

                if (this.turnRemaining <= 0 && this.pattern !== PATTERN.CHICANE) {
                    this._pickPattern();
                }
            } else {
                this._pickPattern();
            }

            // Track cumulative angle — force straight if turning too much
            const angleDelta = this.currentAngle - prevAngle;
            this._cumAngle += angleDelta;
            if (Math.abs(this._cumAngle) > Math.PI * 0.45) {
                // Too much turning in one direction — force a straight breather
                this.turnRemaining = 0;
                this.straightRemaining = Math.max(this.straightRemaining, 15);
                this._cumAngle = 0;
                this._lastTurnDir = 0;
            }

            // Compute candidate position
            let candX = this.lastX + Math.cos(this.currentAngle) * CFG.SEGMENT_LENGTH;
            let candY = this.lastY + Math.sin(this.currentAngle) * CFG.SEGMENT_LENGTH;
            const estWidth = this.spine.length > 0 ? this.spine[this.spine.length - 1].width : CFG.TRACK_WIDTH;

            // Check 1: wall overlap with recent segments (prevents tight loops)
            let recentOverlap = this._wouldOverlapRecent(candX, candY, estWidth);

            // Check 2: predictive avoidance for distant segments
            const safeDist = CFG.TRACK_WIDTH * 3.5;
            const lookSteps = [1, 3, 6, 10, 16, 24, 35, 50];
            let distantThreat = false;
            if (!recentOverlap) {
                for (const step of lookSteps) {
                    const lx = this.lastX + Math.cos(this.currentAngle) * CFG.SEGMENT_LENGTH * step;
                    const ly = this.lastY + Math.sin(this.currentAngle) * CFG.SEGMENT_LENGTH * step;
                    if (this._minDistToOldTrack(lx, ly) < safeDist) {
                        distantThreat = true;
                        break;
                    }
                }
            }

            if (recentOverlap || distantThreat) {
                let bestAngle = this.currentAngle;
                let bestScore = -Infinity;
                for (let i = 0; i < 36; i++) {
                    const testAngle = this.currentAngle + (i / 36) * Math.PI * 2;
                    const tx = this.lastX + Math.cos(testAngle) * CFG.SEGMENT_LENGTH;
                    const ty = this.lastY + Math.sin(testAngle) * CFG.SEGMENT_LENGTH;
                    // Reject angles that cause recent wall overlap
                    if (this._wouldOverlapRecent(tx, ty, estWidth)) continue;
                    // Score by minimum distance at multiple look-ahead points
                    let minScore = Infinity;
                    for (const step of lookSteps) {
                        const lx = this.lastX + Math.cos(testAngle) * CFG.SEGMENT_LENGTH * step;
                        const ly = this.lastY + Math.sin(testAngle) * CFG.SEGMENT_LENGTH * step;
                        const d = this._minDistToOldTrack(lx, ly);
                        if (d < minScore) minScore = d;
                    }
                    if (minScore > bestScore) {
                        bestScore = minScore;
                        bestAngle = testAngle;
                    }
                }
                this.currentAngle = bestAngle;
                this.turnRemaining = 0;
                candX = this.lastX + Math.cos(this.currentAngle) * CFG.SEGMENT_LENGTH;
                candY = this.lastY + Math.sin(this.currentAngle) * CFG.SEGMENT_LENGTH;
            }

            this.lastX = candX;
            this.lastY = candY;

            // Dynamic width — gentler narrowing for more playable roads
            const baseW = lerp(CFG.TRACK_WIDTH, CFG.MIN_TRACK_WIDTH, this.difficulty * 0.5);
            const widthPulse = Math.sin(this.segmentIndex * 0.04) * 20;
            const widthPulse2 = Math.sin(this.segmentIndex * 0.012) * 10;
            const widthJitter = (Math.random() - 0.5) * 6;
            let patternNarrow = 0;
            if (this.pattern === PATTERN.HAIRPIN || this.pattern === PATTERN.SPIRAL) {
                patternNarrow = -15 * (0.3 + this.difficulty);
            } else if (this.pattern === PATTERN.CHICANE || this.pattern === PATTERN.SLALOM) {
                patternNarrow = -10 * (0.3 + this.difficulty);
            } else if (this.pattern === PATTERN.STRAIGHT) {
                patternNarrow = 8;
            }
            const trackW = clamp(baseW + widthPulse + widthPulse2 + widthJitter + patternNarrow, CFG.MIN_TRACK_WIDTH, CFG.TRACK_WIDTH);

            let smoothW = trackW;
            if (this.spine.length > 0) {
                smoothW = lerp(this.spine[this.spine.length - 1].width, trackW, 0.12);
            }

            this.spine.push({
                x: this.lastX,
                y: this.lastY,
                angle: this.currentAngle,
                width: smoothW,
                index: this.segmentIndex
            });
        }

        // Trim old segments and generate new ones
        update(arrowSegIdx) {
            // Remove segments far behind — store a back wall at the cut point
            while (this.spine.length > 0 && this.spine[0].index < arrowSegIdx - CFG.LOOK_BEHIND) {
                const removed = this.spine.shift();
                // Place a barrier wall at the last removed segment
                this.backWall = {
                    x: removed.x,
                    y: removed.y,
                    angle: removed.angle,
                    width: removed.width + 40 // slightly wider than track
                };
            }
            // Generate ahead
            const needed = arrowSegIdx + CFG.LOOK_AHEAD;
            while (this.spine.length === 0 || this.spine[this.spine.length - 1].index < needed) {
                this.generateNext();
            }
        }

        getSegment(idx) {
            for (const s of this.spine) {
                if (s.index === idx) return s;
            }
            return null;
        }

        // Find closest segment to a point
        findClosest(px, py) {
            let best = null, bestDist = Infinity;
            for (const s of this.spine) {
                const d = dist(px, py, s.x, s.y);
                if (d < bestDist) { bestDist = d; best = s; }
            }
            return best;
        }

        // Get left and right wall points for a segment
        getWalls(seg) {
            const nx = Math.cos(seg.angle + Math.PI / 2);
            const ny = Math.sin(seg.angle + Math.PI / 2);
            const hw = seg.width / 2;
            return {
                lx: seg.x + nx * hw, ly: seg.y + ny * hw,
                rx: seg.x - nx * hw, ry: seg.y - ny * hw,
            };
        }
    }

    // ============================================================
    // ARROW (PLAYER)
    // ============================================================
    // Normalize angle to [-PI, PI]
    function normalizeAngle(a) {
        while (a > Math.PI) a -= Math.PI * 2;
        while (a < -Math.PI) a += Math.PI * 2;
        return a;
    }

    // Shortest angular difference from a to b
    function angleDiff(a, b) {
        return normalizeAngle(b - a);
    }

    class Arrow {
        constructor() { this.reset(0, 0); }

        reset(x, y) {
            this.x = x;
            this.y = y;
            this.facing = -Math.PI / 2;   // where the arrow nose points
            this.moveAngle = -Math.PI / 2; // actual velocity direction
            this.steerVel = 0;             // current steering angular velocity
            this.speedMult = 1;
            this.alive = true;
            this.totalDistance = 0;
            this.currentSegIdx = 0;
            this.wallHitTimer = 0;
            this.drifting = false;
            this.driftAmount = 0;          // how much we're sliding (for visuals)
            this.driftTrail = [];
        }

        update(inputDir, dt60) {
            // inputDir: -1 = left, 0 = none, +1 = right
            // INVERTED: tap right -> arrow nose turns LEFT (counter-clockwise)
            //           so the body drifts RIGHT (like counter-steering)

            if (inputDir !== 0) {
                // Steer the facing angle (inverted direction)
                this.steerVel += (-inputDir) * CFG.STEER_RATE * dt60;
                this.steerVel = clamp(this.steerVel, -CFG.STEER_MAX, CFG.STEER_MAX);
            } else {
                // Dampen steering velocity when not pressing
                this.steerVel *= Math.pow(0.85, dt60);
                if (Math.abs(this.steerVel) < 0.001) this.steerVel = 0;
            }

            // Apply steering to facing angle
            this.facing += this.steerVel * dt60;

            // When not pressing, gradually realign facing to movement direction
            if (inputDir === 0) {
                const diff = angleDiff(this.facing, this.moveAngle);
                this.facing += diff * CFG.REALIGN_RATE * dt60;
            }

            // Movement: velocity direction slowly catches up to facing direction
            // This is the core drift mechanic — low GRIP = more sliding
            const diff = angleDiff(this.moveAngle, this.facing);
            this.moveAngle += diff * CFG.GRIP * dt60;

            // Calculate drift amount (angle between facing and movement)
            this.driftAmount = Math.abs(angleDiff(this.facing, this.moveAngle));
            this.drifting = this.driftAmount > 0.05;

            // Drift drag: exponential curve — small drifts barely slow, big drifts drain hard
            // driftAmount is in radians, ~0.05 = tiny drift, ~1.0 = extreme sideways
            const dragLoss = Math.pow(this.driftAmount, CFG.DRIFT_DRAG_EXP) * CFG.DRIFT_DRAG_SCALE * dt60;
            this.speedMult = Math.max(0.5, this.speedMult - dragLoss);

            // Move along VELOCITY direction (not facing direction)
            const speed = CFG.ARROW_SPEED * this.speedMult * dt60;
            this.x += Math.cos(this.moveAngle) * speed;
            this.y += Math.sin(this.moveAngle) * speed;
            this.totalDistance += speed;

            // Recover speed: fast burst when releasing drift, slower while drifting
            let recoveryRate;
            if (inputDir === 0 && this.driftAmount < 0.15) {
                // Not pressing and drift is settling — snap speed back quickly
                recoveryRate = CFG.SPEED_RECOVERY_RELEASE;
            } else if (this.driftAmount < 0.05) {
                recoveryRate = CFG.SPEED_RECOVERY * 2;
            } else {
                recoveryRate = CFG.SPEED_RECOVERY * 0.3;
            }
            if (this.speedMult < 1) {
                this.speedMult = Math.min(1, this.speedMult + recoveryRate * dt60);
            }

            // Wall hit timer
            if (this.wallHitTimer > 0) this.wallHitTimer -= dt60;

            // Drift trail — emit from rear when sliding
            if (this.drifting) {
                const backX = this.x - Math.cos(this.facing) * CFG.ARROW_LENGTH * 0.4;
                const backY = this.y - Math.sin(this.facing) * CFG.ARROW_LENGTH * 0.4;
                const nx = Math.cos(this.facing + Math.PI / 2);
                const ny = Math.sin(this.facing + Math.PI / 2);
                this.driftTrail.push({
                    x: backX + nx * CFG.ARROW_WIDTH * 0.4,
                    y: backY + ny * CFG.ARROW_WIDTH * 0.4,
                    age: 0
                });
                this.driftTrail.push({
                    x: backX - nx * CFG.ARROW_WIDTH * 0.4,
                    y: backY - ny * CFG.ARROW_WIDTH * 0.4,
                    age: 0
                });
            }

            // Age and cull trail
            for (let i = this.driftTrail.length - 1; i >= 0; i--) {
                this.driftTrail[i].age += dt60;
                if (this.driftTrail[i].age > 40) {
                    this.driftTrail.splice(i, 1);
                }
            }
        }

        // The angle used for rendering the arrow visual
        get angle() { return this.facing; }
    }

    // ============================================================
    // PARTICLES
    // ============================================================
    class Particles {
        constructor() { this.list = []; }

        emit(x, y, count, color, spread, speed, life) {
            for (let i = 0; i < count; i++) {
                const a = Math.random() * Math.PI * 2;
                const s = speed * (0.5 + Math.random() * 0.5);
                this.list.push({
                    x, y, vx: Math.cos(a) * s * spread + (Math.random() - 0.5) * speed,
                    vy: Math.sin(a) * s * spread + (Math.random() - 0.5) * speed,
                    life, maxLife: life, color, size: 2 + Math.random() * 3
                });
            }
        }

        sparkWall(x, y) {
            this.emit(x, y, 12, '#ff3366', 1, 3, 25);
            this.emit(x, y, 6, '#ffffff', 1, 2, 15);
        }

        update(dt60) {
            for (let i = this.list.length - 1; i >= 0; i--) {
                const p = this.list[i];
                p.x += p.vx * dt60;
                p.y += p.vy * dt60;
                p.vx *= 0.96;
                p.vy *= 0.96;
                p.life -= dt60;
                if (p.life <= 0) this.list.splice(i, 1);
            }
        }

        render(ctx, camX, camY) {
            for (const p of this.list) {
                const alpha = clamp(p.life / p.maxLife, 0, 1);
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.color;
                const sz = p.size * alpha;
                ctx.fillRect(p.x - camX - sz / 2, p.y - camY - sz / 2, sz, sz);
            }
            ctx.globalAlpha = 1;
        }
    }

    // ============================================================
    // TIME TOKENS
    // ============================================================
    class TimeTokenManager {
        constructor() {
            this.tokens = [];  // {x, y, segIdx, collected, pulse}
            this.lastSpawnSeg = 0;
            this.collectFlash = 0;
        }

        reset() {
            this.tokens = [];
            this.lastSpawnSeg = 0;
            this.collectFlash = 0;
        }

        // Strategically spawn tokens based on distance and difficulty
        // Key insight: spawn rate adapts so the player can survive if they're
        // good, but can't accumulate infinite time
        trySpawn(track, arrowSegIdx, difficulty, timeLeft) {
            // Base interval: every ~40 segments, decreasing slightly with difficulty
            // but also adapts to how much time the player has left
            const baseInterval = 35 - difficulty * 8; // 35 at start, 27 at max difficulty

            // If player is low on time, spawn slightly more often (mercy)
            // If player has lots of time, spawn less often (prevent hoarding)
            let urgencyMod = 0;
            if (timeLeft < 8) urgencyMod = -8;       // spawn sooner when desperate
            else if (timeLeft < 15) urgencyMod = -3;  // gentle boost
            else if (timeLeft > 25) urgencyMod = 10;  // slow down spawns when comfortable
            else if (timeLeft > 35) urgencyMod = 20;  // really slow if hoarding

            const interval = Math.max(15, baseInterval + urgencyMod);

            if (arrowSegIdx - this.lastSpawnSeg >= interval) {
                // Place token ahead on the track center with slight offset
                const spawnAhead = 25 + Math.floor(Math.random() * 30);
                const targetIdx = arrowSegIdx + spawnAhead;
                const seg = track.getSegment(targetIdx);
                if (seg) {
                    // Offset from center so player has to navigate to it
                    const nx = Math.cos(seg.angle + Math.PI / 2);
                    const ny = Math.sin(seg.angle + Math.PI / 2);
                    const offset = (Math.random() - 0.5) * seg.width * 0.5;
                    this.tokens.push({
                        x: seg.x + nx * offset,
                        y: seg.y + ny * offset,
                        segIdx: targetIdx,
                        collected: false,
                        pulse: Math.random() * Math.PI * 2
                    });
                    this.lastSpawnSeg = arrowSegIdx;
                }
            }

            // Cull tokens far behind
            this.tokens = this.tokens.filter(t => t.segIdx > arrowSegIdx - 10);
        }

        // Check if arrow collects any tokens
        checkCollect(arrowX, arrowY) {
            let timeGained = 0;
            for (const t of this.tokens) {
                if (t.collected) continue;
                const d = dist(arrowX, arrowY, t.x, t.y);
                if (d < CFG.TOKEN_RADIUS + CFG.ARROW_LENGTH * 0.5) {
                    t.collected = true;
                    timeGained += CFG.TIME_TOKEN_VALUE;
                    this.collectFlash = 20;
                }
            }
            return timeGained;
        }

        update(dt60) {
            if (this.collectFlash > 0) this.collectFlash -= dt60;
        }

        render(ctx, camX, camY) {
            const now = Date.now() / 1000;
            for (const t of this.tokens) {
                if (t.collected) continue;
                const sx = t.x - camX;
                const sy = t.y - camY;
                const pulse = 0.8 + 0.2 * Math.sin(now * 4 + t.pulse);
                const r = CFG.TOKEN_RADIUS * pulse;

                // Outer glow
                ctx.beginPath();
                ctx.arc(sx, sy, r + 8, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 255, 160, 0.1)';
                ctx.fill();

                // Inner glow
                ctx.beginPath();
                ctx.arc(sx, sy, r + 4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 255, 160, 0.2)';
                ctx.fill();

                // Core
                ctx.beginPath();
                ctx.arc(sx, sy, r, 0, Math.PI * 2);
                ctx.fillStyle = '#00ffa0';
                ctx.shadowColor = '#00ffa0';
                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.shadowBlur = 0;

                // "+" symbol
                ctx.fillStyle = '#003320';
                ctx.font = 'bold ' + Math.floor(r * 1.2) + 'px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('+', sx, sy + 1);
                ctx.textBaseline = 'alphabetic';
                ctx.textAlign = 'left';
            }
        }
    }

    // ============================================================
    // INPUT
    // ============================================================
    class InputManager {
        constructor(canvas) {
            this.canvas = canvas;
            this.leftDown = false;
            this.rightDown = false;
            this.anyTap = false;

            // Touch
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                this.anyTap = true;
                this._handleTouches(e.touches);
            }, { passive: false });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                this._handleTouches(e.touches);
            }, { passive: false });
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                this._handleTouches(e.touches);
            }, { passive: false });
            canvas.addEventListener('touchcancel', (e) => {
                this.leftDown = false;
                this.rightDown = false;
            });

            // Mouse
            canvas.addEventListener('mousedown', (e) => {
                e.preventDefault();
                this.anyTap = true;
                this._handleMouse(e);
            });
            canvas.addEventListener('mousemove', (e) => {
                if (e.buttons & 1) this._handleMouse(e);
            });
            canvas.addEventListener('mouseup', () => {
                this.leftDown = false;
                this.rightDown = false;
            });

            // Keyboard
            document.addEventListener('keydown', (e) => {
                if (e.code === 'ArrowLeft' || e.code === 'KeyA') { this.leftDown = true; this.anyTap = true; }
                if (e.code === 'ArrowRight' || e.code === 'KeyD') { this.rightDown = true; this.anyTap = true; }
                if (e.code === 'Space') this.anyTap = true;
            });
            document.addEventListener('keyup', (e) => {
                if (e.code === 'ArrowLeft' || e.code === 'KeyA') this.leftDown = false;
                if (e.code === 'ArrowRight' || e.code === 'KeyD') this.rightDown = false;
            });

            document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        }

        _handleTouches(touches) {
            this.leftDown = false;
            this.rightDown = false;
            const mid = this.canvas.width / 2;
            for (let i = 0; i < touches.length; i++) {
                if (touches[i].clientX < mid) this.leftDown = true;
                else this.rightDown = true;
            }
        }

        _handleMouse(e) {
            const mid = this.canvas.width / 2;
            this.leftDown = e.clientX < mid;
            this.rightDown = e.clientX >= mid;
        }

        getDir() {
            if (this.leftDown && this.rightDown) return 0; // braking — no steer
            if (this.leftDown) return -1;
            if (this.rightDown) return 1;
            return 0;
        }

        isBraking() {
            return this.leftDown && this.rightDown;
        }

        consumeTap() {
            const t = this.anyTap;
            this.anyTap = false;
            return t;
        }
    }

    // ============================================================
    // AUDIO
    // ============================================================
    class GameAudio {
        constructor() { this.ctx = null; }
        init() {
            try {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) { this.ctx = null; }
        }
        _ensure() {
            if (!this.ctx) this.init();
            if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
            return !!this.ctx;
        }
        wallHit() {
            if (!this._ensure()) return;
            const o = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            o.connect(g); g.connect(this.ctx.destination);
            o.type = 'sawtooth';
            const t = this.ctx.currentTime;
            o.frequency.setValueAtTime(250, t);
            o.frequency.linearRampToValueAtTime(80, t + 0.15);
            g.gain.setValueAtTime(0.2, t);
            g.gain.linearRampToValueAtTime(0, t + 0.15);
            o.start(t); o.stop(t + 0.15);
        }
        // Continuous drift hum — call startDrift/stopDrift to manage
        startDrift() {
            if (!this._ensure()) return;
            if (this._driftNode) return; // already playing
            const ctx = this.ctx;

            // Soft filtered noise-like hum using detuned oscillators
            const o1 = ctx.createOscillator();
            const o2 = ctx.createOscillator();
            const g = ctx.createGain();
            const filter = ctx.createBiquadFilter();

            o1.type = 'sine';
            o2.type = 'triangle';
            o1.frequency.setValueAtTime(85, ctx.currentTime);
            o2.frequency.setValueAtTime(127, ctx.currentTime); // fifth above
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(300, ctx.currentTime);
            filter.Q.setValueAtTime(5, ctx.currentTime);

            o1.connect(filter);
            o2.connect(filter);
            filter.connect(g);
            g.connect(ctx.destination);
            g.gain.setValueAtTime(0, ctx.currentTime);
            g.gain.linearRampToValueAtTime(0.06, ctx.currentTime + 0.15);

            o1.start();
            o2.start();
            this._driftNode = { o1, o2, g, filter };
        }

        updateDrift(driftAmount) {
            if (!this._driftNode) return;
            const ctx = this.ctx;
            const n = this._driftNode;
            // Modulate filter and volume with drift intensity
            const intensity = clamp(driftAmount / 0.8, 0, 1);
            n.filter.frequency.setTargetAtTime(200 + intensity * 600, ctx.currentTime, 0.05);
            n.g.gain.setTargetAtTime(0.03 + intensity * 0.06, ctx.currentTime, 0.05);
            n.o1.frequency.setTargetAtTime(75 + intensity * 60, ctx.currentTime, 0.1);
        }

        stopDrift() {
            if (!this._driftNode) return;
            const ctx = this.ctx;
            const n = this._driftNode;
            n.g.gain.setTargetAtTime(0, ctx.currentTime, 0.1);
            const cleanup = () => { try { n.o1.stop(); n.o2.stop(); } catch(e){} };
            setTimeout(cleanup, 300);
            this._driftNode = null;
        }
        tokenCollect() {
            if (!this._ensure()) return;
            const ctx = this.ctx;
            const t = ctx.currentTime;

            // Pick a random pentatonic note for variety (C, D, E, G, A across octaves)
            const notes = [523, 587, 659, 784, 880, 1047, 1175, 1319];
            const baseFreq = notes[Math.floor(Math.random() * notes.length)];
            // Slight random detune for organic feel
            const detune = (Math.random() - 0.5) * 30;

            // Soft sine chime — main tone
            const o1 = ctx.createOscillator();
            const g1 = ctx.createGain();
            o1.type = 'sine';
            o1.frequency.setValueAtTime(baseFreq, t);
            o1.detune.setValueAtTime(detune, t);
            o1.connect(g1);
            g1.gain.setValueAtTime(0, t);
            g1.gain.linearRampToValueAtTime(0.12, t + 0.02);
            g1.gain.exponentialRampToValueAtTime(0.001, t + 0.5);

            // Soft harmonic overtone (octave + fifth above)
            const o2 = ctx.createOscillator();
            const g2 = ctx.createGain();
            o2.type = 'sine';
            o2.frequency.setValueAtTime(baseFreq * 1.5, t);
            o2.detune.setValueAtTime(-detune, t);
            o2.connect(g2);
            g2.gain.setValueAtTime(0, t);
            g2.gain.linearRampToValueAtTime(0.05, t + 0.01);
            g2.gain.exponentialRampToValueAtTime(0.001, t + 0.35);

            g1.connect(ctx.destination);
            g2.connect(ctx.destination);
            o1.start(t); o1.stop(t + 0.5);
            o2.start(t); o2.stop(t + 0.35);
        }
    }

    // ============================================================
    // RENDERER
    // ============================================================
    class GameRenderer {
        constructor(canvas) {
            this.canvas = canvas;
            this.ctx = canvas.getContext('2d');
        }

        resize() {
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight;
        }

        clear() {
            const ctx = this.ctx;
            ctx.fillStyle = '#0a0014';
            ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        }

        drawTrack(track, camX, camY) {
            const ctx = this.ctx;
            const spine = track.spine;
            if (spine.length < 2) return;

            // Build wall paths
            const leftWall = [];
            const rightWall = [];
            for (const seg of spine) {
                const w = track.getWalls(seg);
                leftWall.push({ x: w.lx - camX, y: w.ly - camY });
                rightWall.push({ x: w.rx - camX, y: w.ry - camY });
            }

            // Track surface (dark)
            ctx.beginPath();
            ctx.moveTo(leftWall[0].x, leftWall[0].y);
            for (let i = 1; i < leftWall.length; i++) ctx.lineTo(leftWall[i].x, leftWall[i].y);
            for (let i = rightWall.length - 1; i >= 0; i--) ctx.lineTo(rightWall[i].x, rightWall[i].y);
            ctx.closePath();
            ctx.fillStyle = '#120024';
            ctx.fill();

            // Center line (subtle)
            ctx.beginPath();
            ctx.moveTo(spine[0].x - camX, spine[0].y - camY);
            for (let i = 1; i < spine.length; i++) {
                ctx.lineTo(spine[i].x - camX, spine[i].y - camY);
            }
            ctx.strokeStyle = 'rgba(100, 50, 180, 0.15)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Neon walls
            this._drawNeonLine(leftWall, '#ff00ff', 3);
            this._drawNeonLine(rightWall, '#00ffff', 3);

            // Back wall barrier (red glow across deleted track)
            if (track.backWall) {
                const bw = track.backWall;
                const nx = Math.cos(bw.angle + Math.PI / 2);
                const ny = Math.sin(bw.angle + Math.PI / 2);
                const hw = bw.width / 2;
                const pts = [
                    { x: bw.x + nx * hw - camX, y: bw.y + ny * hw - camY },
                    { x: bw.x - nx * hw - camX, y: bw.y - ny * hw - camY }
                ];
                this._drawNeonLine(pts, '#ff3366', 4);
            }

            // Start wall barrier (red glow behind starting point)
            if (track.startWall) {
                const sw = track.startWall;
                const nx = Math.cos(sw.angle + Math.PI / 2);
                const ny = Math.sin(sw.angle + Math.PI / 2);
                const hw = sw.width / 2;
                const pts = [
                    { x: sw.x + nx * hw - camX, y: sw.y + ny * hw - camY },
                    { x: sw.x - nx * hw - camX, y: sw.y - ny * hw - camY }
                ];
                this._drawNeonLine(pts, '#ff3366', 4);
            }
        }

        _drawNeonLine(points, color, width) {
            const ctx = this.ctx;
            if (points.length < 2) return;

            // Glow
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
            ctx.strokeStyle = color;
            ctx.lineWidth = width + 6;
            ctx.globalAlpha = 0.15;
            ctx.stroke();
            ctx.lineWidth = width + 3;
            ctx.globalAlpha = 0.3;
            ctx.stroke();

            // Core
            ctx.lineWidth = width;
            ctx.globalAlpha = 0.9;
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        drawArrow(arrow, camX, camY) {
            const ctx = this.ctx;
            const sx = arrow.x - camX;
            const sy = arrow.y - camY;
            const a = arrow.angle;
            const len = CFG.ARROW_LENGTH;
            const hw = CFG.ARROW_WIDTH / 2;

            // Drift trail
            for (const t of arrow.driftTrail) {
                const alpha = clamp(1 - t.age / 40, 0, 1) * 0.5;
                ctx.globalAlpha = alpha;
                const slideDir = angleDiff(arrow.facing, arrow.moveAngle);
                const trailColor = slideDir > 0 ? '#ff00ff' : '#00ffff';
                ctx.fillStyle = trailColor;
                ctx.fillRect(t.x - camX - 1.5, t.y - camY - 1.5, 3, 3);
            }
            ctx.globalAlpha = 1;

            // Arrow body
            ctx.save();
            ctx.translate(sx, sy);
            ctx.rotate(a);

            // Glow
            ctx.shadowColor = '#ffff00';
            ctx.shadowBlur = arrow.wallHitTimer > 0 ? 25 : 15;

            // Arrow shape
            ctx.beginPath();
            ctx.moveTo(len * 0.6, 0);           // tip
            ctx.lineTo(-len * 0.4, -hw);        // back left
            ctx.lineTo(-len * 0.2, 0);          // notch
            ctx.lineTo(-len * 0.4, hw);         // back right
            ctx.closePath();

            // Fill with gradient
            const wallFlash = arrow.wallHitTimer > 0 ? 0.5 + Math.sin(arrow.wallHitTimer * 0.5) * 0.5 : 0;
            if (wallFlash > 0.3) {
                ctx.fillStyle = '#ff3366';
            } else {
                ctx.fillStyle = '#ffee00';
            }
            ctx.fill();

            // White inner highlight
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.moveTo(len * 0.4, 0);
            ctx.lineTo(-len * 0.1, -hw * 0.4);
            ctx.lineTo(0, 0);
            ctx.lineTo(-len * 0.1, hw * 0.4);
            ctx.closePath();
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fill();

            ctx.restore();
        }

        drawHUD(distance, timeLeft, highScore, speedMult, canvasW, timeFlash, braking) {
            const ctx = this.ctx;

            // Distance (top-left)
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 24px monospace';
            ctx.textAlign = 'left';
            ctx.fillText(this._formatDist(distance), 15, 35);

            // High score as distance
            ctx.font = '12px monospace';
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fillText('BEST: ' + this._formatDist(highScore), 15, 52);

            // Timer (top-right)
            const timeStr = timeLeft.toFixed(1);
            ctx.textAlign = 'right';
            const isLow = timeLeft < 8;
            const isCritical = timeLeft < 4;

            if (timeFlash > 0) {
                ctx.shadowColor = '#00ffa0';
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#00ffa0';
                ctx.font = 'bold 28px monospace';
            } else if (isCritical) {
                const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 150);
                ctx.shadowColor = '#ff3366';
                ctx.shadowBlur = 15 * pulse;
                ctx.fillStyle = '#ff3366';
                ctx.font = 'bold 30px monospace';
            } else if (isLow) {
                ctx.shadowColor = '#ffaa00';
                ctx.shadowBlur = 8;
                ctx.fillStyle = '#ffaa00';
                ctx.font = 'bold 26px monospace';
            } else {
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 24px monospace';
            }
            ctx.fillText(timeStr + 's', canvasW - 15, 35);
            ctx.shadowBlur = 0;

            // Speed indicator (centered)
            if (braking) {
                ctx.textAlign = 'center';
                ctx.font = 'bold 16px monospace';
                ctx.fillStyle = '#ff8800';
                ctx.shadowColor = '#ff8800';
                ctx.shadowBlur = 10;
                ctx.fillText('BRAKE', canvasW / 2, 30);
                ctx.shadowBlur = 0;
            } else if (speedMult < 0.9) {
                ctx.textAlign = 'center';
                ctx.font = 'bold 14px monospace';
                ctx.fillStyle = '#ff3366';
                ctx.fillText('SLOW', canvasW / 2, 30);
            }

            ctx.textAlign = 'left';
        }

        _formatDist(meters) {
            const m = Math.floor(meters);
            if (m < 1000) return m + 'm';
            const km = m / 1000;
            return km.toFixed(2) + 'km';
        }

        drawMenu(canvasW, canvasH, highScore) {
            const ctx = this.ctx;
            ctx.textAlign = 'center';

            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#ff00ff';
            ctx.font = 'bold 52px monospace';
            ctx.fillText('DRIFT', canvasW / 2, canvasH / 2 - 60);

            ctx.shadowColor = '#00ffff';
            ctx.fillStyle = '#00ffff';
            ctx.fillText('ARROW', canvasW / 2, canvasH / 2 - 5);
            ctx.shadowBlur = 0;

            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '16px monospace';
            ctx.fillText('Tap left/right to drift', canvasW / 2, canvasH / 2 + 40);

            ctx.fillStyle = 'rgba(0,255,160,0.5)';
            ctx.font = '13px monospace';
            ctx.fillText('Collect + tokens to stay alive', canvasW / 2, canvasH / 2 + 60);

            const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 400);
            ctx.fillStyle = 'rgba(255,255,255,' + (0.4 + pulse * 0.6) + ')';
            ctx.font = 'bold 20px monospace';
            ctx.fillText('TAP TO START', canvasW / 2, canvasH / 2 + 90);

            if (highScore > 0) {
                ctx.fillStyle = '#ffee00';
                ctx.font = '15px monospace';
                ctx.fillText('RECORD: ' + this._formatDist(highScore), canvasW / 2, canvasH / 2 + 130);
            }

            ctx.textAlign = 'left';
        }

        drawGameOver(canvasW, canvasH, distance, highScore, isNewHigh, deathCause) {
            const ctx = this.ctx;
            ctx.fillStyle = 'rgba(10, 0, 20, 0.7)';
            ctx.fillRect(0, 0, canvasW, canvasH);

            ctx.textAlign = 'center';

            const deathText = deathCause === 'time' ? 'TIME UP' : 'WRECKED';
            ctx.shadowColor = '#ff3366';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#ff3366';
            ctx.font = 'bold 40px monospace';
            ctx.fillText(deathText, canvasW / 2, canvasH / 2 - 50);
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 26px monospace';
            ctx.fillText(this._formatDist(distance), canvasW / 2, canvasH / 2 + 5);

            if (isNewHigh) {
                ctx.fillStyle = '#ffee00';
                ctx.font = 'bold 16px monospace';
                ctx.fillText('NEW RECORD!', canvasW / 2, canvasH / 2 + 35);
            } else {
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.font = '14px monospace';
                ctx.fillText('BEST: ' + this._formatDist(highScore), canvasW / 2, canvasH / 2 + 35);
            }

            const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 400);
            ctx.fillStyle = 'rgba(255,255,255,' + (0.4 + pulse * 0.6) + ')';
            ctx.font = '18px monospace';
            ctx.fillText('TAP TO RETRY', canvasW / 2, canvasH / 2 + 85);

            ctx.textAlign = 'left';
        }
    }

    // ============================================================
    // GAME
    // ============================================================
    const STATE = { MENU: 0, COUNTDOWN: 1, PLAYING: 2, GAME_OVER: 3 };

    class Game {
        constructor(canvas) {
            this.canvas = canvas;
            this.renderer = new GameRenderer(canvas);
            this.input = new InputManager(canvas);
            this.audio = new GameAudio();
            this.particles = new Particles();
            this.track = new Track();
            this.arrow = new Arrow();
            this.tokens = new TimeTokenManager();
            this.state = STATE.MENU;
            this.highScore = parseInt(localStorage.getItem('driftArrowHigh') || '0', 10);
            this.distance = 0;
            this.timeLeft = 0;
            this.isNewHigh = false;
            this.gameOverDelay = 0;
            this.lastSegPassed = 0;
            this.lastTime = 0;
            this.camX = 0;
            this.camY = 0;
            this.timeFlash = 0;

            this.renderer.resize();
            window.addEventListener('resize', () => this.renderer.resize());
        }

        startGame() {
            this.audio.init();
            const cx = this.canvas.width / 2;
            const cy = this.canvas.height / 2 + 100;
            this.track.init(cx, cy);
            this.arrow.reset(cx, cy);
            this.tokens.reset();
            this.distance = 0;
            this.timeLeft = CFG.START_TIME;
            this.isNewHigh = false;
            this.gameOverDelay = 0;
            this.lastSegPassed = 0;
            this.peakSegIdx = 0;
            this.backwardTimer = 0;
            this.timeFlash = 0;
            this.diedFromWall = false;

            // Place a wall behind the starting point so user can't turn back
            const startSeg = this.track.spine[0];
            if (startSeg) {
                this.track.startWall = {
                    x: startSeg.x,
                    y: startSeg.y,
                    angle: startSeg.angle,
                    width: startSeg.width + 40
                };
            }

            // Snap camera immediately to start position
            const lookAheadDist = 80;
            this.camX = this.arrow.x + Math.cos(this.arrow.moveAngle) * lookAheadDist - this.canvas.width / 2;
            this.camY = this.arrow.y + Math.sin(this.arrow.moveAngle) * lookAheadDist - this.canvas.height / 2;

            // Enter countdown state
            this.countdownTimer = 90; // ~1.5 seconds at 60fps
            this.state = STATE.COUNTDOWN;
        }

        die() {
            this.state = STATE.GAME_OVER;
            this.audio.stopDrift();
            if (this.timeLeft <= 0) this.deathCause = 'time';
            else if (this.diedFromWall) this.deathCause = 'wall';
            else this.deathCause = 'other';
            this.gameOverDelay = 60;
            this.particles.emit(this.arrow.x, this.arrow.y, 30, '#ff3366', 1.5, 4, 40);
            this.particles.emit(this.arrow.x, this.arrow.y, 20, '#ffee00', 1, 3, 30);

            const score = Math.floor(this.distance);
            if (score > this.highScore) {
                this.highScore = score;
                this.isNewHigh = true;
                localStorage.setItem('driftArrowHigh', String(this.highScore));
            }
        }

        checkWallCollision() {
            const arrow = this.arrow;
            const seg = this.track.findClosest(arrow.x, arrow.y);
            if (!seg) return;

            arrow.currentSegIdx = seg.index;

            // Wall normal: perpendicular to track direction
            const nx = Math.cos(seg.angle + Math.PI / 2);
            const ny = Math.sin(seg.angle + Math.PI / 2);
            const dx = arrow.x - seg.x;
            const dy = arrow.y - seg.y;
            const cross = dx * nx + dy * ny;
            const hw = seg.width / 2;

            // Touching wall = instant death
            if (Math.abs(cross) > hw - CFG.ARROW_WIDTH * 0.3) {
                const side = cross > 0 ? 1 : -1;
                const hitX = seg.x + nx * hw * side;
                const hitY = seg.y + ny * hw * side;
                this.particles.emit(hitX, hitY, 15, '#ff3366', 1.5, 3, 25);
                this.particles.emit(hitX, hitY, 8, '#ffffff', 1, 2, 15);
                this.audio.wallHit();
                this.diedFromWall = true;
                this.die();
            }
        }

        checkBackWallCollision() {
            const bw = this.track.backWall;
            if (!bw) return;
            const arrow = this.arrow;
            // The back wall is perpendicular to track direction at the cut point
            // Check if arrow is behind the wall (on the deleted side)
            const fwdX = Math.cos(bw.angle);
            const fwdY = Math.sin(bw.angle);
            const dx = arrow.x - bw.x;
            const dy = arrow.y - bw.y;
            const along = dx * fwdX + dy * fwdY;
            // Also check lateral distance so it only triggers when near the wall
            const nx = -fwdY;
            const ny = fwdX;
            const lateral = Math.abs(dx * nx + dy * ny);
            if (along < 0 && lateral < bw.width / 2) {
                this.particles.emit(bw.x, bw.y, 15, '#ff3366', 1.5, 3, 25);
                this.audio.wallHit();
                this.diedFromWall = true;
                this.die();
            }
        }

        checkStartWallCollision() {
            const sw = this.track.startWall;
            if (!sw) return;
            const arrow = this.arrow;
            const fwdX = Math.cos(sw.angle);
            const fwdY = Math.sin(sw.angle);
            const dx = arrow.x - sw.x;
            const dy = arrow.y - sw.y;
            const along = dx * fwdX + dy * fwdY;
            const nx = -fwdY;
            const ny = fwdX;
            const lateral = Math.abs(dx * nx + dy * ny);
            if (along < 0 && lateral < sw.width / 2) {
                this.particles.emit(sw.x, sw.y, 15, '#ff3366', 1.5, 3, 25);
                this.audio.wallHit();
                this.diedFromWall = true;
                this.die();
            }
        }

        updatePlaying(dt60) {
            const dir = this.input.getDir();
            const braking = this.input.isBraking();
            this.arrow.update(dir, dt60);

            // Braking: both sides pressed slows down
            if (braking) {
                this.arrow.speedMult = Math.max(
                    CFG.BRAKE_MIN_SPEED,
                    this.arrow.speedMult - CFG.BRAKE_DECEL * dt60
                );
            }

            // Drift sound management
            if (this.arrow.drifting && this.arrow.driftAmount > 0.1) {
                this.audio.startDrift();
                this.audio.updateDrift(this.arrow.driftAmount);
            } else {
                this.audio.stopDrift();
            }

            // Update track
            this.track.update(this.arrow.currentSegIdx);

            // Wall collision
            this.checkWallCollision();
            if (this.state !== STATE.PLAYING) return;

            // Back wall collision (barrier at deleted track)
            this.checkBackWallCollision();
            if (this.state !== STATE.PLAYING) return;

            // Start wall collision (wall behind starting point)
            this.checkStartWallCollision();
            if (this.state !== STATE.PLAYING) return;

            // Distance tracking: convert segments to meters
            const seg = this.track.findClosest(this.arrow.x, this.arrow.y);
            if (seg && seg.index > this.lastSegPassed) {
                const segsPassed = seg.index - this.lastSegPassed;
                this.lastSegPassed = seg.index;
                this.distance += segsPassed * CFG.METERS_PER_SEGMENT;
            }

            // Backward detection: if arrow is behind peak, slow down
            if (seg) {
                if (seg.index > this.peakSegIdx) {
                    this.peakSegIdx = seg.index;
                    this.backwardTimer = 0;
                } else if (seg.index < this.peakSegIdx - 3) {
                    // Going backward — ramp up slowdown over ~1 second (60 frames)
                    this.backwardTimer += dt60;
                    const brakeFactor = clamp(this.backwardTimer / 60, 0, 1);
                    this.arrow.speedMult *= (1 - brakeFactor * 0.08 * dt60);
                    this.arrow.speedMult = Math.max(0.1, this.arrow.speedMult);
                }
            }

            // Countdown timer
            const dtSec = dt60 * 16.67 / 1000;
            this.timeLeft -= dtSec;
            if (this.timeLeft <= 0) {
                this.timeLeft = 0;
                this.die();
                return;
            }

            // Time tokens: spawn and collect
            this.tokens.trySpawn(this.track, this.arrow.currentSegIdx, this.track.difficulty, this.timeLeft);
            const gained = this.tokens.checkCollect(this.arrow.x, this.arrow.y);
            if (gained > 0) {
                this.timeLeft += gained;
                this.timeFlash = 30;
                this.audio.tokenCollect();
                this.particles.emit(this.arrow.x, this.arrow.y, 12, '#00ffa0', 1.2, 3, 20);
            }
            this.tokens.update(dt60);

            // Particles
            this.particles.update(dt60);

            // Time flash decay
            if (this.timeFlash > 0) this.timeFlash -= dt60;

            // Camera: follow arrow along MOVEMENT direction (not facing)
            // Reduce look-ahead when slow/drifting to prevent dizzy spinning
            const speedFactor = this.arrow.speedMult;
            const lookAheadDist = 80 * speedFactor;
            // Use moveAngle for camera so it doesn't swing with steering
            const targetCamX = this.arrow.x + Math.cos(this.arrow.moveAngle) * lookAheadDist - this.canvas.width / 2;
            const targetCamY = this.arrow.y + Math.sin(this.arrow.moveAngle) * lookAheadDist - this.canvas.height / 2;
            // Slower camera lerp when drifting hard to reduce motion sickness
            const camSpeed = this.arrow.drifting ? 0.04 : 0.07;
            this.camX = lerp(this.camX, targetCamX, camSpeed * dt60);
            this.camY = lerp(this.camY, targetCamY, camSpeed * dt60);
        }

        update(timestamp) {
            const dt = this.lastTime ? timestamp - this.lastTime : 16.67;
            this.lastTime = timestamp;
            const dt60 = dt / 16.67; // normalize to 60fps

            switch (this.state) {
                case STATE.MENU:
                    if (this.input.consumeTap()) this.startGame();
                    break;

                case STATE.COUNTDOWN:
                    this.countdownTimer -= dt60;
                    if (this.countdownTimer <= 0) {
                        this.state = STATE.PLAYING;
                    }
                    break;

                case STATE.PLAYING:
                    this.updatePlaying(dt60);
                    break;

                case STATE.GAME_OVER:
                    this.particles.update(dt60);
                    this.gameOverDelay -= dt60;
                    if (this.gameOverDelay <= 0 && this.input.consumeTap()) {
                        this.state = STATE.MENU;
                    }
                    break;
            }
        }

        render() {
            const w = this.canvas.width, h = this.canvas.height;
            this.renderer.clear();

            if (this.state === STATE.MENU) {
                this.renderer.drawMenu(w, h, this.highScore);
                return;
            }

            // Draw track
            this.renderer.drawTrack(this.track, this.camX, this.camY);

            // Draw time tokens
            this.tokens.render(this.renderer.ctx, this.camX, this.camY);

            // Draw particles
            this.particles.render(this.renderer.ctx, this.camX, this.camY);

            // Draw arrow
            if (this.state === STATE.PLAYING || this.state === STATE.COUNTDOWN) {
                this.renderer.drawArrow(this.arrow, this.camX, this.camY);
            }

            // HUD
            if (this.state === STATE.PLAYING) {
                const braking = this.input.isBraking();
                this.renderer.drawHUD(this.distance, this.timeLeft, this.highScore, this.arrow.speedMult, w, this.timeFlash, braking);
            }

            // Countdown overlay
            if (this.state === STATE.COUNTDOWN) {
                const countNum = Math.ceil(this.countdownTimer / 60);
                const pulse = 1 + 0.3 * Math.sin((this.countdownTimer % 60) / 60 * Math.PI);
                const ctx = this.renderer.ctx;
                ctx.save();
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.fillRect(0, 0, w, h);
                ctx.fillStyle = '#ffffff';
                ctx.font = `bold ${Math.floor(80 * pulse)}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = '#00ffa0';
                ctx.shadowBlur = 30;
                ctx.fillText(countNum > 0 ? String(countNum) : 'GO!', w / 2, h / 2);
                ctx.shadowBlur = 0;
                ctx.font = '18px sans-serif';
                ctx.fillStyle = '#aaaaaa';
                ctx.fillText('GET READY', w / 2, h / 2 + 60);
                ctx.restore();
            }

            if (this.state === STATE.GAME_OVER) {
                // Still show track and particles
                this.renderer.drawGameOver(w, h, this.distance, this.highScore, this.isNewHigh, this.deathCause);
            }
        }

        loop(timestamp) {
            this.update(timestamp);
            this.render();
            requestAnimationFrame((t) => this.loop(t));
        }

        start() {
            requestAnimationFrame((t) => this.loop(t));
        }
    }

    // ============================================================
    // BOOTSTRAP
    // ============================================================
    const canvas = document.getElementById('game');
    const game = new Game(canvas);
    game.start();
    </script>
</body>
</html>
