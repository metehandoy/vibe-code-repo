<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Drift Arrow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #0a0014; touch-action: none;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <script>
    'use strict';

    // ============================================================
    // CONFIG
    // ============================================================
    const CFG = {
        ARROW_SPEED: 3.5,           // constant forward speed (pixels per frame at 60fps)
        STEER_RATE: 0.012,          // how fast facing angle turns per frame when holding (slower)
        STEER_MAX: 0.04,            // max steering angular velocity (lower cap)
        GRIP: 0.03,                 // how fast velocity dir catches up to facing dir (low = more slide)
        REALIGN_RATE: 0.04,         // how fast facing returns to velocity dir on release
        DRIFT_DRAG_EXP: 3.0,       // exponent for drift drag curve (higher = gentle start, harsh at high angle)
        DRIFT_DRAG_SCALE: 0.008,    // overall drag intensity per frame
        ARROW_LENGTH: 22,
        ARROW_WIDTH: 10,
        TRACK_WIDTH: 120,           // starting track width
        MIN_TRACK_WIDTH: 65,        // narrowest track gets
        SEGMENT_LENGTH: 12,         // distance between track spine points
        LOOK_AHEAD: 80,             // how many segments visible ahead
        LOOK_BEHIND: 60,            // segments visible behind (increased to prevent pop-out)
        WALL_SLOW: 0.95,            // speed multiplier on wall hit
        SPEED_RECOVERY: 0.015,      // how fast speed recovers after wall hit
        COMBO_DECAY_TIME: 2000,     // ms before combo resets
        COMBO_PER_SEGMENT: 1,       // combo increment for clean segment pass
        DIFFICULTY_RAMP: 0.00008,   // how fast difficulty increases per segment
    };

    // ============================================================
    // UTILS
    // ============================================================
    function lerp(a, b, t) { return a + (b - a) * t; }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function dist(x1, y1, x2, y2) { return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2); }

    // ============================================================
    // PROCEDURAL TRACK
    // ============================================================
    class Track {
        constructor() {
            this.spine = [];       // center points [{x, y, angle}]
            this.difficulty = 0;
            this.currentAngle = -Math.PI / 2; // start going up
            this.segmentIndex = 0;
            this.lastX = 0;
            this.lastY = 0;
            this.turnBudget = 0;   // for generating smooth curves
            this.turnDir = 0;
            this.turnRemaining = 0;
            this.straightRemaining = 0;
        }

        init(startX, startY) {
            this.lastX = startX;
            this.lastY = startY;
            this.currentAngle = -Math.PI / 2;
            this.spine = [];
            this.segmentIndex = 0;
            this.difficulty = 0;
            this.straightRemaining = 20; // start with a straight section
            this.turnRemaining = 0;

            // Generate initial segments
            for (let i = 0; i < CFG.LOOK_AHEAD + CFG.LOOK_BEHIND + 20; i++) {
                this.generateNext();
            }
        }

        generateNext() {
            this.segmentIndex++;
            this.difficulty = Math.min(1, this.segmentIndex * CFG.DIFFICULTY_RAMP);

            // Decide turn behavior
            if (this.straightRemaining > 0) {
                this.straightRemaining--;
                // Gentle random wobble
                this.currentAngle += (Math.random() - 0.5) * 0.01;
            } else if (this.turnRemaining > 0) {
                this.turnRemaining--;
                const sharpness = 0.03 + this.difficulty * 0.05;
                this.currentAngle += this.turnDir * sharpness;
            } else {
                // Decide next section
                if (Math.random() < 0.4 + this.difficulty * 0.2) {
                    // Start a turn
                    this.turnDir = Math.random() < 0.5 ? -1 : 1;
                    this.turnRemaining = 8 + Math.floor(Math.random() * 20);
                    // Occasionally create hairpins
                    if (Math.random() < this.difficulty * 0.3) {
                        this.turnRemaining = 25 + Math.floor(Math.random() * 15);
                    }
                } else {
                    // Straight section
                    this.straightRemaining = 5 + Math.floor(Math.random() * 15 * (1 - this.difficulty * 0.5));
                }
            }

            this.lastX += Math.cos(this.currentAngle) * CFG.SEGMENT_LENGTH;
            this.lastY += Math.sin(this.currentAngle) * CFG.SEGMENT_LENGTH;

            const trackW = lerp(CFG.TRACK_WIDTH, CFG.MIN_TRACK_WIDTH, this.difficulty);

            this.spine.push({
                x: this.lastX,
                y: this.lastY,
                angle: this.currentAngle,
                width: trackW,
                index: this.segmentIndex
            });
        }

        // Trim old segments and generate new ones
        update(arrowSegIdx) {
            // Remove segments far behind
            while (this.spine.length > 0 && this.spine[0].index < arrowSegIdx - CFG.LOOK_BEHIND) {
                this.spine.shift();
            }
            // Generate ahead
            const needed = arrowSegIdx + CFG.LOOK_AHEAD;
            while (this.spine.length === 0 || this.spine[this.spine.length - 1].index < needed) {
                this.generateNext();
            }
        }

        getSegment(idx) {
            for (const s of this.spine) {
                if (s.index === idx) return s;
            }
            return null;
        }

        // Find closest segment to a point
        findClosest(px, py) {
            let best = null, bestDist = Infinity;
            for (const s of this.spine) {
                const d = dist(px, py, s.x, s.y);
                if (d < bestDist) { bestDist = d; best = s; }
            }
            return best;
        }

        // Get left and right wall points for a segment
        getWalls(seg) {
            const nx = Math.cos(seg.angle + Math.PI / 2);
            const ny = Math.sin(seg.angle + Math.PI / 2);
            const hw = seg.width / 2;
            return {
                lx: seg.x + nx * hw, ly: seg.y + ny * hw,
                rx: seg.x - nx * hw, ry: seg.y - ny * hw,
            };
        }
    }

    // ============================================================
    // ARROW (PLAYER)
    // ============================================================
    // Normalize angle to [-PI, PI]
    function normalizeAngle(a) {
        while (a > Math.PI) a -= Math.PI * 2;
        while (a < -Math.PI) a += Math.PI * 2;
        return a;
    }

    // Shortest angular difference from a to b
    function angleDiff(a, b) {
        return normalizeAngle(b - a);
    }

    class Arrow {
        constructor() { this.reset(0, 0); }

        reset(x, y) {
            this.x = x;
            this.y = y;
            this.facing = -Math.PI / 2;   // where the arrow nose points
            this.moveAngle = -Math.PI / 2; // actual velocity direction
            this.steerVel = 0;             // current steering angular velocity
            this.speedMult = 1;
            this.alive = true;
            this.totalDistance = 0;
            this.currentSegIdx = 0;
            this.wallHitTimer = 0;
            this.drifting = false;
            this.driftAmount = 0;          // how much we're sliding (for visuals)
            this.driftTrail = [];
        }

        update(inputDir, dt60) {
            // inputDir: -1 = left, 0 = none, +1 = right
            // INVERTED: tap right -> arrow nose turns LEFT (counter-clockwise)
            //           so the body drifts RIGHT (like counter-steering)

            if (inputDir !== 0) {
                // Steer the facing angle (inverted direction)
                this.steerVel += (-inputDir) * CFG.STEER_RATE * dt60;
                this.steerVel = clamp(this.steerVel, -CFG.STEER_MAX, CFG.STEER_MAX);
            } else {
                // Dampen steering velocity when not pressing
                this.steerVel *= Math.pow(0.85, dt60);
                if (Math.abs(this.steerVel) < 0.001) this.steerVel = 0;
            }

            // Apply steering to facing angle
            this.facing += this.steerVel * dt60;

            // When not pressing, gradually realign facing to movement direction
            if (inputDir === 0) {
                const diff = angleDiff(this.facing, this.moveAngle);
                this.facing += diff * CFG.REALIGN_RATE * dt60;
            }

            // Movement: velocity direction slowly catches up to facing direction
            // This is the core drift mechanic — low GRIP = more sliding
            const diff = angleDiff(this.moveAngle, this.facing);
            this.moveAngle += diff * CFG.GRIP * dt60;

            // Calculate drift amount (angle between facing and movement)
            this.driftAmount = Math.abs(angleDiff(this.facing, this.moveAngle));
            this.drifting = this.driftAmount > 0.05;

            // Drift drag: exponential curve — small drifts barely slow, big drifts drain hard
            // driftAmount is in radians, ~0.05 = tiny drift, ~1.0 = extreme sideways
            const dragLoss = Math.pow(this.driftAmount, CFG.DRIFT_DRAG_EXP) * CFG.DRIFT_DRAG_SCALE * dt60;
            this.speedMult = Math.max(0.25, this.speedMult - dragLoss);

            // Move along VELOCITY direction (not facing direction)
            const speed = CFG.ARROW_SPEED * this.speedMult * dt60;
            this.x += Math.cos(this.moveAngle) * speed;
            this.y += Math.sin(this.moveAngle) * speed;
            this.totalDistance += speed;

            // Recover speed gradually (always recovers, faster when straight)
            const recoveryRate = this.driftAmount < 0.05 ? CFG.SPEED_RECOVERY : CFG.SPEED_RECOVERY * 0.3;
            if (this.speedMult < 1) {
                this.speedMult = Math.min(1, this.speedMult + recoveryRate * dt60);
            }

            // Wall hit timer
            if (this.wallHitTimer > 0) this.wallHitTimer -= dt60;

            // Drift trail — emit from rear when sliding
            if (this.drifting) {
                const backX = this.x - Math.cos(this.facing) * CFG.ARROW_LENGTH * 0.4;
                const backY = this.y - Math.sin(this.facing) * CFG.ARROW_LENGTH * 0.4;
                const nx = Math.cos(this.facing + Math.PI / 2);
                const ny = Math.sin(this.facing + Math.PI / 2);
                this.driftTrail.push({
                    x: backX + nx * CFG.ARROW_WIDTH * 0.4,
                    y: backY + ny * CFG.ARROW_WIDTH * 0.4,
                    age: 0
                });
                this.driftTrail.push({
                    x: backX - nx * CFG.ARROW_WIDTH * 0.4,
                    y: backY - ny * CFG.ARROW_WIDTH * 0.4,
                    age: 0
                });
            }

            // Age and cull trail
            for (let i = this.driftTrail.length - 1; i >= 0; i--) {
                this.driftTrail[i].age += dt60;
                if (this.driftTrail[i].age > 40) {
                    this.driftTrail.splice(i, 1);
                }
            }
        }

        // The angle used for rendering the arrow visual
        get angle() { return this.facing; }
    }

    // ============================================================
    // PARTICLES
    // ============================================================
    class Particles {
        constructor() { this.list = []; }

        emit(x, y, count, color, spread, speed, life) {
            for (let i = 0; i < count; i++) {
                const a = Math.random() * Math.PI * 2;
                const s = speed * (0.5 + Math.random() * 0.5);
                this.list.push({
                    x, y, vx: Math.cos(a) * s * spread + (Math.random() - 0.5) * speed,
                    vy: Math.sin(a) * s * spread + (Math.random() - 0.5) * speed,
                    life, maxLife: life, color, size: 2 + Math.random() * 3
                });
            }
        }

        sparkWall(x, y) {
            this.emit(x, y, 12, '#ff3366', 1, 3, 25);
            this.emit(x, y, 6, '#ffffff', 1, 2, 15);
        }

        update(dt60) {
            for (let i = this.list.length - 1; i >= 0; i--) {
                const p = this.list[i];
                p.x += p.vx * dt60;
                p.y += p.vy * dt60;
                p.vx *= 0.96;
                p.vy *= 0.96;
                p.life -= dt60;
                if (p.life <= 0) this.list.splice(i, 1);
            }
        }

        render(ctx, camX, camY) {
            for (const p of this.list) {
                const alpha = clamp(p.life / p.maxLife, 0, 1);
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.color;
                const sz = p.size * alpha;
                ctx.fillRect(p.x - camX - sz / 2, p.y - camY - sz / 2, sz, sz);
            }
            ctx.globalAlpha = 1;
        }
    }

    // ============================================================
    // INPUT
    // ============================================================
    class InputManager {
        constructor(canvas) {
            this.canvas = canvas;
            this.leftDown = false;
            this.rightDown = false;
            this.anyTap = false;

            // Touch
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                this.anyTap = true;
                this._handleTouches(e.touches);
            }, { passive: false });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                this._handleTouches(e.touches);
            }, { passive: false });
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                this._handleTouches(e.touches);
            }, { passive: false });
            canvas.addEventListener('touchcancel', (e) => {
                this.leftDown = false;
                this.rightDown = false;
            });

            // Mouse
            canvas.addEventListener('mousedown', (e) => {
                e.preventDefault();
                this.anyTap = true;
                this._handleMouse(e);
            });
            canvas.addEventListener('mousemove', (e) => {
                if (e.buttons & 1) this._handleMouse(e);
            });
            canvas.addEventListener('mouseup', () => {
                this.leftDown = false;
                this.rightDown = false;
            });

            // Keyboard
            document.addEventListener('keydown', (e) => {
                if (e.code === 'ArrowLeft' || e.code === 'KeyA') { this.leftDown = true; this.anyTap = true; }
                if (e.code === 'ArrowRight' || e.code === 'KeyD') { this.rightDown = true; this.anyTap = true; }
                if (e.code === 'Space') this.anyTap = true;
            });
            document.addEventListener('keyup', (e) => {
                if (e.code === 'ArrowLeft' || e.code === 'KeyA') this.leftDown = false;
                if (e.code === 'ArrowRight' || e.code === 'KeyD') this.rightDown = false;
            });

            document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        }

        _handleTouches(touches) {
            this.leftDown = false;
            this.rightDown = false;
            const mid = this.canvas.width / 2;
            for (let i = 0; i < touches.length; i++) {
                if (touches[i].clientX < mid) this.leftDown = true;
                else this.rightDown = true;
            }
        }

        _handleMouse(e) {
            const mid = this.canvas.width / 2;
            this.leftDown = e.clientX < mid;
            this.rightDown = e.clientX >= mid;
        }

        getDir() {
            if (this.leftDown && this.rightDown) return 0;
            if (this.leftDown) return -1;
            if (this.rightDown) return 1;
            return 0;
        }

        consumeTap() {
            const t = this.anyTap;
            this.anyTap = false;
            return t;
        }
    }

    // ============================================================
    // AUDIO
    // ============================================================
    class GameAudio {
        constructor() { this.ctx = null; }
        init() {
            try {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) { this.ctx = null; }
        }
        _ensure() {
            if (!this.ctx) this.init();
            if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
            return !!this.ctx;
        }
        wallHit() {
            if (!this._ensure()) return;
            const o = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            o.connect(g); g.connect(this.ctx.destination);
            o.type = 'sawtooth';
            const t = this.ctx.currentTime;
            o.frequency.setValueAtTime(250, t);
            o.frequency.linearRampToValueAtTime(80, t + 0.15);
            g.gain.setValueAtTime(0.2, t);
            g.gain.linearRampToValueAtTime(0, t + 0.15);
            o.start(t); o.stop(t + 0.15);
        }
        drift() {
            if (!this._ensure()) return;
            const o = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            o.connect(g); g.connect(this.ctx.destination);
            o.type = 'sine';
            const t = this.ctx.currentTime;
            o.frequency.setValueAtTime(120, t);
            g.gain.setValueAtTime(0.03, t);
            g.gain.linearRampToValueAtTime(0, t + 0.1);
            o.start(t); o.stop(t + 0.1);
        }
    }

    // ============================================================
    // RENDERER
    // ============================================================
    class GameRenderer {
        constructor(canvas) {
            this.canvas = canvas;
            this.ctx = canvas.getContext('2d');
        }

        resize() {
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight;
        }

        clear() {
            const ctx = this.ctx;
            ctx.fillStyle = '#0a0014';
            ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        }

        drawTrack(track, camX, camY) {
            const ctx = this.ctx;
            const spine = track.spine;
            if (spine.length < 2) return;

            // Build wall paths
            const leftWall = [];
            const rightWall = [];
            for (const seg of spine) {
                const w = track.getWalls(seg);
                leftWall.push({ x: w.lx - camX, y: w.ly - camY });
                rightWall.push({ x: w.rx - camX, y: w.ry - camY });
            }

            // Track surface (dark)
            ctx.beginPath();
            ctx.moveTo(leftWall[0].x, leftWall[0].y);
            for (let i = 1; i < leftWall.length; i++) ctx.lineTo(leftWall[i].x, leftWall[i].y);
            for (let i = rightWall.length - 1; i >= 0; i--) ctx.lineTo(rightWall[i].x, rightWall[i].y);
            ctx.closePath();
            ctx.fillStyle = '#120024';
            ctx.fill();

            // Center line (subtle)
            ctx.beginPath();
            ctx.moveTo(spine[0].x - camX, spine[0].y - camY);
            for (let i = 1; i < spine.length; i++) {
                ctx.lineTo(spine[i].x - camX, spine[i].y - camY);
            }
            ctx.strokeStyle = 'rgba(100, 50, 180, 0.15)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Neon walls
            this._drawNeonLine(leftWall, '#ff00ff', 3);
            this._drawNeonLine(rightWall, '#00ffff', 3);
        }

        _drawNeonLine(points, color, width) {
            const ctx = this.ctx;
            if (points.length < 2) return;

            // Glow
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
            ctx.strokeStyle = color;
            ctx.lineWidth = width + 6;
            ctx.globalAlpha = 0.15;
            ctx.stroke();
            ctx.lineWidth = width + 3;
            ctx.globalAlpha = 0.3;
            ctx.stroke();

            // Core
            ctx.lineWidth = width;
            ctx.globalAlpha = 0.9;
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        drawArrow(arrow, camX, camY) {
            const ctx = this.ctx;
            const sx = arrow.x - camX;
            const sy = arrow.y - camY;
            const a = arrow.angle;
            const len = CFG.ARROW_LENGTH;
            const hw = CFG.ARROW_WIDTH / 2;

            // Drift trail
            for (const t of arrow.driftTrail) {
                const alpha = clamp(1 - t.age / 40, 0, 1) * 0.5;
                ctx.globalAlpha = alpha;
                const slideDir = angleDiff(arrow.facing, arrow.moveAngle);
                const trailColor = slideDir > 0 ? '#ff00ff' : '#00ffff';
                ctx.fillStyle = trailColor;
                ctx.fillRect(t.x - camX - 1.5, t.y - camY - 1.5, 3, 3);
            }
            ctx.globalAlpha = 1;

            // Arrow body
            ctx.save();
            ctx.translate(sx, sy);
            ctx.rotate(a);

            // Glow
            ctx.shadowColor = '#ffff00';
            ctx.shadowBlur = arrow.wallHitTimer > 0 ? 25 : 15;

            // Arrow shape
            ctx.beginPath();
            ctx.moveTo(len * 0.6, 0);           // tip
            ctx.lineTo(-len * 0.4, -hw);        // back left
            ctx.lineTo(-len * 0.2, 0);          // notch
            ctx.lineTo(-len * 0.4, hw);         // back right
            ctx.closePath();

            // Fill with gradient
            const wallFlash = arrow.wallHitTimer > 0 ? 0.5 + Math.sin(arrow.wallHitTimer * 0.5) * 0.5 : 0;
            if (wallFlash > 0.3) {
                ctx.fillStyle = '#ff3366';
            } else {
                ctx.fillStyle = '#ffee00';
            }
            ctx.fill();

            // White inner highlight
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.moveTo(len * 0.4, 0);
            ctx.lineTo(-len * 0.1, -hw * 0.4);
            ctx.lineTo(0, 0);
            ctx.lineTo(-len * 0.1, hw * 0.4);
            ctx.closePath();
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fill();

            ctx.restore();
        }

        drawHUD(score, combo, highScore, speedMult, canvasW) {
            const ctx = this.ctx;

            // Score
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 22px monospace';
            ctx.textAlign = 'left';
            ctx.fillText('SCORE: ' + score, 15, 35);

            // High score
            ctx.font = '13px monospace';
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fillText('BEST: ' + highScore, 15, 55);

            // Combo
            if (combo > 1) {
                ctx.textAlign = 'right';
                ctx.font = 'bold 20px monospace';
                const comboAlpha = Math.min(1, combo / 10);
                ctx.fillStyle = 'rgba(255, 255, 0, ' + (0.5 + comboAlpha * 0.5) + ')';
                ctx.fillText('x' + combo + ' COMBO', canvasW - 15, 35);
            }

            // Speed indicator
            if (speedMult < 0.9) {
                ctx.textAlign = 'center';
                ctx.font = 'bold 14px monospace';
                ctx.fillStyle = '#ff3366';
                ctx.fillText('SLOW', canvasW / 2, 30);
            }

            ctx.textAlign = 'left';
        }

        drawMenu(canvasW, canvasH, highScore) {
            const ctx = this.ctx;
            ctx.textAlign = 'center';

            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#ff00ff';
            ctx.font = 'bold 52px monospace';
            ctx.fillText('DRIFT', canvasW / 2, canvasH / 2 - 60);

            ctx.shadowColor = '#00ffff';
            ctx.fillStyle = '#00ffff';
            ctx.fillText('ARROW', canvasW / 2, canvasH / 2 - 5);
            ctx.shadowBlur = 0;

            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '16px monospace';
            ctx.fillText('Tap left/right to drift', canvasW / 2, canvasH / 2 + 45);

            const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 400);
            ctx.fillStyle = 'rgba(255,255,255,' + (0.4 + pulse * 0.6) + ')';
            ctx.font = 'bold 20px monospace';
            ctx.fillText('TAP TO START', canvasW / 2, canvasH / 2 + 90);

            if (highScore > 0) {
                ctx.fillStyle = '#ffee00';
                ctx.font = '15px monospace';
                ctx.fillText('HIGH SCORE: ' + highScore, canvasW / 2, canvasH / 2 + 130);
            }

            ctx.textAlign = 'left';
        }

        drawGameOver(canvasW, canvasH, score, highScore, isNewHigh) {
            const ctx = this.ctx;
            ctx.fillStyle = 'rgba(10, 0, 20, 0.7)';
            ctx.fillRect(0, 0, canvasW, canvasH);

            ctx.textAlign = 'center';

            ctx.shadowColor = '#ff3366';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#ff3366';
            ctx.font = 'bold 40px monospace';
            ctx.fillText('WRECKED', canvasW / 2, canvasH / 2 - 50);
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 26px monospace';
            ctx.fillText('SCORE: ' + score, canvasW / 2, canvasH / 2 + 5);

            if (isNewHigh) {
                ctx.fillStyle = '#ffee00';
                ctx.font = 'bold 16px monospace';
                ctx.fillText('NEW HIGH SCORE!', canvasW / 2, canvasH / 2 + 35);
            } else {
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.font = '14px monospace';
                ctx.fillText('BEST: ' + highScore, canvasW / 2, canvasH / 2 + 35);
            }

            const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 400);
            ctx.fillStyle = 'rgba(255,255,255,' + (0.4 + pulse * 0.6) + ')';
            ctx.font = '18px monospace';
            ctx.fillText('TAP TO RETRY', canvasW / 2, canvasH / 2 + 85);

            ctx.textAlign = 'left';
        }
    }

    // ============================================================
    // GAME
    // ============================================================
    const STATE = { MENU: 0, PLAYING: 1, GAME_OVER: 2 };

    class Game {
        constructor(canvas) {
            this.canvas = canvas;
            this.renderer = new GameRenderer(canvas);
            this.input = new InputManager(canvas);
            this.audio = new GameAudio();
            this.particles = new Particles();
            this.track = new Track();
            this.arrow = new Arrow();
            this.state = STATE.MENU;
            this.highScore = parseInt(localStorage.getItem('driftArrowHigh') || '0', 10);
            this.score = 0;
            this.combo = 0;
            this.lastComboTime = 0;
            this.isNewHigh = false;
            this.gameOverDelay = 0;
            this.lastSegPassed = 0;
            this.lastTime = 0;
            this.camX = 0;
            this.camY = 0;
            // How far arrow can stray from track before game over
            this.maxOffTrack = 300;

            this.renderer.resize();
            window.addEventListener('resize', () => this.renderer.resize());
        }

        startGame() {
            this.audio.init();
            const cx = this.canvas.width / 2;
            const cy = this.canvas.height / 2 + 100;
            this.track.init(cx, cy);
            this.arrow.reset(cx, cy);
            this.score = 0;
            this.combo = 0;
            this.lastComboTime = 0;
            this.isNewHigh = false;
            this.gameOverDelay = 0;
            this.lastSegPassed = 0;
            this.state = STATE.PLAYING;
        }

        die() {
            this.state = STATE.GAME_OVER;
            this.gameOverDelay = 60; // frames
            this.particles.emit(this.arrow.x, this.arrow.y, 30, '#ff3366', 1.5, 4, 40);
            this.particles.emit(this.arrow.x, this.arrow.y, 20, '#ffee00', 1, 3, 30);

            if (this.score > this.highScore) {
                this.highScore = this.score;
                this.isNewHigh = true;
                localStorage.setItem('driftArrowHigh', String(this.highScore));
            }
        }

        checkWallCollision() {
            const arrow = this.arrow;
            const seg = this.track.findClosest(arrow.x, arrow.y);
            if (!seg) return;

            arrow.currentSegIdx = seg.index;

            // Wall normal: perpendicular to track direction
            const nx = Math.cos(seg.angle + Math.PI / 2);
            const ny = Math.sin(seg.angle + Math.PI / 2);
            const dx = arrow.x - seg.x;
            const dy = arrow.y - seg.y;
            const cross = dx * nx + dy * ny; // signed distance from center
            const hw = seg.width / 2;

            if (Math.abs(cross) > hw - CFG.ARROW_WIDTH * 0.3) {
                const side = cross > 0 ? 1 : -1;

                // Clamp position to wall edge
                arrow.x = seg.x + nx * (hw - CFG.ARROW_WIDTH * 0.4) * side;
                arrow.y = seg.y + ny * (hw - CFG.ARROW_WIDTH * 0.4) * side;

                // Reflect moveAngle off the wall
                // Wall direction = seg.angle; wall normal points inward = -side * (nx, ny)
                // Reflection: R = V - 2(V·N)N where V is movement vector, N is inward normal
                const wallNx = -nx * side;
                const wallNy = -ny * side;
                const mvx = Math.cos(arrow.moveAngle);
                const mvy = Math.sin(arrow.moveAngle);
                const dot = mvx * wallNx + mvy * wallNy;

                // Only reflect if moving into the wall (dot < 0)
                if (dot < 0) {
                    const rx = mvx - 2 * dot * wallNx;
                    const ry = mvy - 2 * dot * wallNy;
                    arrow.moveAngle = Math.atan2(ry, rx);
                    // Also nudge facing toward reflected angle
                    arrow.facing = arrow.moveAngle;
                    arrow.steerVel = 0;

                    // Slow down on impact
                    arrow.speedMult = Math.max(0.25, arrow.speedMult * CFG.WALL_SLOW);
                    arrow.wallHitTimer = 10;

                    // Reset combo
                    this.combo = 0;

                    // Spark particles
                    const hitX = seg.x + nx * hw * side;
                    const hitY = seg.y + ny * hw * side;
                    this.particles.emit(hitX, hitY, 6, '#ff3366', 1, 2.5, 18);
                    this.particles.emit(hitX, hitY, 3, '#ffffff', 0.8, 1.5, 10);
                    this.audio.wallHit();
                }
            }

            // Game over if completely off track
            if (Math.abs(cross) > hw + this.maxOffTrack) {
                this.die();
            }
        }

        updatePlaying(dt60) {
            const dir = this.input.getDir();
            this.arrow.update(dir, dt60);

            // Update track
            this.track.update(this.arrow.currentSegIdx);

            // Wall collision
            this.checkWallCollision();
            if (this.state !== STATE.PLAYING) return;

            // Score: 1 point per segment passed
            const seg = this.track.findClosest(this.arrow.x, this.arrow.y);
            if (seg && seg.index > this.lastSegPassed) {
                const segsPassed = seg.index - this.lastSegPassed;
                this.lastSegPassed = seg.index;

                // Combo tracking
                const now = Date.now();
                if (now - this.lastComboTime < CFG.COMBO_DECAY_TIME) {
                    this.combo += segsPassed;
                } else {
                    this.combo = segsPassed;
                }
                this.lastComboTime = now;

                // Score with combo multiplier
                const multiplier = 1 + Math.floor(this.combo / 10) * 0.5;
                this.score += Math.floor(segsPassed * multiplier);
            }

            // Combo decay
            if (Date.now() - this.lastComboTime > CFG.COMBO_DECAY_TIME) {
                this.combo = 0;
            }

            // Particles
            this.particles.update(dt60);

            // Camera: follow arrow, centered, slightly ahead
            const lookAheadDist = 80;
            const targetCamX = this.arrow.x + Math.cos(this.arrow.angle) * lookAheadDist - this.canvas.width / 2;
            const targetCamY = this.arrow.y + Math.sin(this.arrow.angle) * lookAheadDist - this.canvas.height / 2;
            this.camX = lerp(this.camX, targetCamX, 0.08 * dt60);
            this.camY = lerp(this.camY, targetCamY, 0.08 * dt60);
        }

        update(timestamp) {
            const dt = this.lastTime ? timestamp - this.lastTime : 16.67;
            this.lastTime = timestamp;
            const dt60 = dt / 16.67; // normalize to 60fps

            switch (this.state) {
                case STATE.MENU:
                    if (this.input.consumeTap()) this.startGame();
                    break;

                case STATE.PLAYING:
                    this.updatePlaying(dt60);
                    break;

                case STATE.GAME_OVER:
                    this.particles.update(dt60);
                    this.gameOverDelay -= dt60;
                    if (this.gameOverDelay <= 0 && this.input.consumeTap()) {
                        this.state = STATE.MENU;
                    }
                    break;
            }
        }

        render() {
            const w = this.canvas.width, h = this.canvas.height;
            this.renderer.clear();

            if (this.state === STATE.MENU) {
                this.renderer.drawMenu(w, h, this.highScore);
                return;
            }

            // Draw track
            this.renderer.drawTrack(this.track, this.camX, this.camY);

            // Draw particles
            this.particles.render(this.renderer.ctx, this.camX, this.camY);

            // Draw arrow
            if (this.state === STATE.PLAYING) {
                this.renderer.drawArrow(this.arrow, this.camX, this.camY);
            }

            // HUD
            if (this.state === STATE.PLAYING) {
                this.renderer.drawHUD(this.score, this.combo, this.highScore, this.arrow.speedMult, w);
            }

            if (this.state === STATE.GAME_OVER) {
                // Still show track and particles
                this.renderer.drawGameOver(w, h, this.score, this.highScore, this.isNewHigh);
            }
        }

        loop(timestamp) {
            this.update(timestamp);
            this.render();
            requestAnimationFrame((t) => this.loop(t));
        }

        start() {
            requestAnimationFrame((t) => this.loop(t));
        }
    }

    // ============================================================
    // BOOTSTRAP
    // ============================================================
    const canvas = document.getElementById('game');
    const game = new Game(canvas);
    game.start();
    </script>
</body>
</html>
