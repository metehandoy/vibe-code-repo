name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run all tests in headless browser
        run: |
          # Install a lightweight static file server and Puppeteer
          npm install --no-save puppeteer serve

          # Start a local server in the background
          npx serve . -l 8080 &
          SERVER_PID=$!
          sleep 2

          # Run all test files using Puppeteer
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            const testFiles = [
              'collision-tests.html',
              'utils-tests.html',
              'arrow-tests.html',
              'hazard-tests.html',
              'track-tests.html',
              'token-tests.html',
              'game-state-tests.html'
            ];

            let allPassed = true;

            for (const file of testFiles) {
              console.log('\n--- Running ' + file + ' ---');
              const page = await browser.newPage();
              let hasFailed = false;

              page.on('console', msg => {
                const text = msg.text();
                console.log(text);
              });

              page.on('pageerror', err => {
                console.error('Page error:', err.message);
                hasFailed = true;
              });

              await page.goto('http://localhost:8080/tests/' + file, {
                waitUntil: 'networkidle0',
                timeout: 30000
              });

              await page.waitForSelector('.summary', { timeout: 15000 });

              const pass = await page.evaluate(() => {
                const summary = document.querySelector('.summary');
                return summary && summary.classList.contains('all-pass');
              });

              if (!pass || hasFailed) {
                console.error(file + ' FAILED');
                allPassed = false;
              }

              await page.close();
            }

            await browser.close();

            if (!allPassed) {
              console.error('\nSome tests FAILED');
              process.exit(1);
            }
            console.log('\nAll test suites passed');
          })();
          "

          # Clean up server
          kill $SERVER_PID 2>/dev/null || true

  validate-html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check game files exist and are valid
        run: |
          # Ensure index.html exists and is non-empty
          if [ ! -s index.html ]; then
            echo "ERROR: index.html is missing or empty"
            exit 1
          fi

          # Basic syntax check - ensure the HTML has required structure
          grep -q '<canvas' index.html || { echo "ERROR: No canvas element found"; exit 1; }

          # Check JS modules exist (refactored from monolithic index.html)
          for f in js/config.js js/utils.js js/track.js js/arrow.js js/particles.js \
                   js/tokens.js js/hazards.js js/input.js js/audio.js js/renderer.js \
                   js/game.js js/bootstrap.js; do
            if [ ! -s "$f" ]; then
              echo "ERROR: $f is missing or empty"
              exit 1
            fi
          done

          grep -q "'use strict'" js/config.js || { echo "ERROR: Missing 'use strict' directive"; exit 1; }
          grep -q 'class Game' js/game.js || { echo "ERROR: Game class not found"; exit 1; }

          # Ensure dist/mobile.html (single-file build) exists and contains inline game code
          if [ -s dist/mobile.html ]; then
            grep -q 'class Game' dist/mobile.html || { echo "ERROR: dist/mobile.html missing Game class"; exit 1; }
          fi

          echo "HTML validation passed"
