                const ahead = s.index - closestSeg.index;
                if (ahead > 2 && ahead < 40) {
                    totalCurve += angleDiff(closestSeg.angle, s.angle);
                    count++;
                }
            }
            if (count > 0) {
                const avgCurve = totalCurve / count;
                const perpAngle = this.arrow.moveAngle + Math.PI / 2;
                const curveStrength = clamp(Math.abs(avgCurve) * 200, 0, 100);
                const curveDir = avgCurve > 0 ? 1 : -1;
                curveOffX = Math.cos(perpAngle) * curveStrength * curveDir;
                curveOffY = Math.sin(perpAngle) * curveStrength * curveDir;
            }
        }

        // Combine: center on arrow, then shift by look-ahead + screen offset + curvature
        const targetCamX = this.arrow.x + dirX * lookAheadDist + screenOffX + curveOffX - this.canvas.width / 2;
        const targetCamY = this.arrow.y + dirY * lookAheadDist + screenOffY + curveOffY - this.canvas.height / 2;
        // Camera lerp: faster at high speeds to prevent lag-behind
        const baseCamSpeed = this.arrow.drifting ? 0.04 : 0.07;
        const camSpeed = baseCamSpeed + 0.03 * Math.max(0, speedRatio - 1);
        this.camX = lerp(this.camX, targetCamX, camSpeed * dt60);
        this.camY = lerp(this.camY, targetCamY, camSpeed * dt60);
    }

    update(timestamp) {
        const dt = this.lastTime ? timestamp - this.lastTime : 16.67;
        this.lastTime = timestamp;
        const dt60 = dt / 16.67; // normalize to 60fps

        switch (this.state) {
            case STATE.MENU:
                if (this.input.consumeTap()) this.startGame();
                break;

            case STATE.COUNTDOWN:
                this.countdownTimer -= dt60;
                if (this.countdownTimer <= 0) {
                    this.state = STATE.PLAYING;
                }
                break;

            case STATE.PLAYING:
                this.updatePlaying(dt60);
                break;

            case STATE.GAME_OVER:
                this.particles.update(dt60);
                this.gameOverDelay -= dt60;
                if (this.gameOverDelay <= 0 && this.input.consumeTap()) {
                    this.state = STATE.MENU;
                }
                break;
        }
    }

    render() {
        const w = this.canvas.width, h = this.canvas.height;
        this.renderer.clear();

        if (this.state === STATE.MENU) {
            this.renderer.drawMenu(w, h, this.highScore);
            return;
        }

        // Apply zoom transform centered on screen
        const ctx = this.renderer.ctx;
        const zoom = this.camZoom;
        ctx.save();
        ctx.translate(w / 2, h / 2);
        ctx.scale(zoom, zoom);
        ctx.translate(-w / 2, -h / 2);

        // Draw track
        this.renderer.drawTrack(this.track, this.camX, this.camY);

        // Draw time tokens
        this.tokens.render(ctx, this.camX, this.camY);

        // Draw hazards
        this.hazards.render(ctx, this.camX, this.camY);

        // Draw particles
        this.particles.render(ctx, this.camX, this.camY);

        // Draw arrow
        if (this.state === STATE.PLAYING || this.state === STATE.COUNTDOWN) {
            this.renderer.drawArrow(this.arrow, this.camX, this.camY, this.arrow.speedMult, this.hazards.getActiveEffect());
        }

        ctx.restore(); // Remove zoom transform

        // HUD
        if (this.state === STATE.PLAYING) {
            const braking = this.input.isBraking();
            const hazardEffect = this.hazards.getActiveEffect();
            this.renderer.drawHUD(this.distance, this.timeLeft, this.highScore, this.arrow.speedMult, w, this.timeFlash, braking, hazardEffect);
        }

        // Countdown overlay
        if (this.state === STATE.COUNTDOWN) {
            const countNum = Math.ceil(this.countdownTimer / 60);
            const pulse = 1 + 0.3 * Math.sin((this.countdownTimer % 60) / 60 * Math.PI);
            const ctx = this.renderer.ctx;
            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#ffffff';
            ctx.font = `bold ${Math.floor(80 * pulse)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#00ffa0';
            ctx.shadowBlur = 30;
            ctx.fillText(countNum > 0 ? String(countNum) : 'GO!', w / 2, h / 2);
            ctx.shadowBlur = 0;
            ctx.font = '18px sans-serif';
            ctx.fillStyle = '#aaaaaa';
            ctx.fillText('GET READY', w / 2, h / 2 + 60);
            ctx.restore();
        }

        if (this.state === STATE.GAME_OVER) {
            // Still show track and particles
            this.renderer.drawGameOver(w, h, this.distance, this.highScore, this.isNewHigh, this.deathCause);
        }
    }

    loop(timestamp) {
        if (this.stopped) return;
        this.update(timestamp);
        this.render();
        requestAnimationFrame((t) => this.loop(t));
    }
    stop() { this.stopped = true; }

    start() {
        requestAnimationFrame((t) => this.loop(t));
    }
}

    const STEP = 120, INTERVAL = 60;
    let _timer = null;

    function startScroll(dir) {
        const body = document.getElementById('dev-panel-body');
        body.scrollTop += dir * STEP;
        _timer = setInterval(() => { body.scrollTop += dir * STEP; }, INTERVAL);
    }
    function stopScroll() { clearInterval(_timer); _timer = null; }

    ['up', 'dn'].forEach((id, i) => {
        const dir = i === 0 ? -1 : 1;
        const btn = document.getElementById('scroll-' + id + '-btn');
        btn.addEventListener('mousedown',  () => startScroll(dir));
        btn.addEventListener('touchstart', () => startScroll(dir), { passive: true });
        btn.addEventListener('mouseup',   stopScroll);
        btn.addEventListener('mouseleave', stopScroll);
        btn.addEventListener('touchend',  stopScroll);
        btn.addEventListener('touchcancel', stopScroll);
    });
}());

// ---- Tooltip management ----
let activeTooltip = null;
function showParamTooltip(labelEl, key) {
    hideParamTooltip();
    const desc = PARAM_DESCRIPTIONS[key];
    if (!desc) return;
    const tip = document.createElement('div');
    tip.className = 'param-desc-tooltip';
    tip.innerHTML = '<div class="tooltip-key">' + key + '</div><div class="tooltip-text">' + desc + '</div>';
    document.body.appendChild(tip);
    // Position near the label
    const rect = labelEl.getBoundingClientRect();
    let left = rect.right + 8;
    let top = rect.top - 4;
    // On mobile (panel at bottom) or if it overflows right, show below instead
    if (left + 260 > window.innerWidth || window.innerWidth <= 768) {
        left = Math.max(8, rect.left);
        top = rect.bottom + 6;
    }
    // Keep it on screen vertically
    if (top + 80 > window.innerHeight) {
        top = Math.max(8, rect.top - 70);
    }
    tip.style.left = left + 'px';
    tip.style.top = top + 'px';
    activeTooltip = tip;
    // Auto-hide after 5 seconds
    tip._timer = setTimeout(hideParamTooltip, 5000);
}
function hideParamTooltip() {
    if (activeTooltip) {
        clearTimeout(activeTooltip._timer);
        activeTooltip.remove();
        activeTooltip = null;
    }
}
// Dismiss on any tap/click outside
document.addEventListener('pointerdown', (e) => {
    if (activeTooltip && !e.target.closest('.param-row label')) {
        hideParamTooltip();
    }
}, true);

// current holds slider values (not yet applied); initialised from live CFG
// (which already has any localStorage overrides baked in via the sync transform)
let current = typeof CFG !== 'undefined' ? { ...CFG } : { ...DEFAULTS };
let applied  = { ...current };
let hasUnapplied = false;

function buildUI() {
    const container = document.getElementById('params');
    container.innerHTML = '';
    for (const section of PARAM_SECTIONS) {
        const div = document.createElement('div');
        div.className = 'section';
        const title = document.createElement('div');
        title.className = 'section-title';
        title.textContent = section.title;
        const body = document.createElement('div');
        body.className = 'section-body';
        title.addEventListener('click', () => {
            body.style.display = body.style.display === 'none' ? '' : 'none';
        });
        div.appendChild(title);
        for (const [key, label, min, max, step] of section.params) {
            const row = document.createElement('div');
            row.className = 'param-row';
            const lbl = document.createElement('label');
            lbl.textContent = label;
            lbl.title = key;
            lbl.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                showParamTooltip(lbl, key);
            });
            const slider = document.createElement('input');
            slider.type = 'range';
            slider.min = min; slider.max = max; slider.step = step;
            slider.value = current[key] !== undefined ? current[key] : DEFAULTS[key];
            slider.id = 'slider-' + key;
            const numInput = document.createElement('input');
            numInput.type = 'number';
            numInput.min = min; numInput.max = max; numInput.step = step;
            numInput.value = slider.value;
            numInput.id = 'num-' + key;
            slider.addEventListener('input', () => {
                const v = parseFloat(slider.value);
                current[key] = v; numInput.value = v; markChanged();
                const resetBtn = row.querySelector('.param-reset-btn');
                if (resetBtn) resetBtn.classList.toggle('is-default', v === DEFAULTS[key]);
            });
            numInput.addEventListener('change', () => {
                const v = parseFloat(numInput.value);
                if (!isNaN(v)) {
                    current[key] = v;
                    slider.value = Math.max(min, Math.min(max, v));
                    markChanged();
                    resetBtn.classList.toggle('is-default', v === DEFAULTS[key]);
                }
            });
            const resetBtn = document.createElement('button');
            resetBtn.className = 'param-reset-btn';
            resetBtn.textContent = '\u21BA';
            resetBtn.title = 'Reset to default (' + DEFAULTS[key] + ')';
            if (current[key] === DEFAULTS[key]) resetBtn.classList.add('is-default');
            resetBtn.addEventListener('click', () => {
                current[key] = DEFAULTS[key];
                slider.value = DEFAULTS[key];
                numInput.value = DEFAULTS[key];
                resetBtn.classList.add('is-default');
                markChanged();
            });
            row.appendChild(lbl); row.appendChild(slider); row.appendChild(numInput); row.appendChild(resetBtn);
            body.appendChild(row);
        }
        div.appendChild(body);
        container.appendChild(div);
    }
}

function markChanged() {
    hasUnapplied = true;
    document.getElementById('apply-btn').classList.add('changed');
    autoSave();
}

function applyConfig() {
    Object.assign(CFG, current);
    autoSave();
    _startGame();
    applied = { ...current };
    hasUnapplied = false;
    document.getElementById('apply-btn').classList.remove('changed');
    showStatus('Config applied — game restarted');
    closePanel();
}

function autoSave() {
    localStorage.setItem('driftArrowDevConfig', JSON.stringify(current));
}

function updateUIFromCurrent() {
    for (const section of PARAM_SECTIONS) {
        for (const [key, , min, max] of section.params) {
            const slider   = document.getElementById('slider-' + key);
            const numInput = document.getElementById('num-' + key);
            if (slider)   slider.value   = Math.max(min, Math.min(max, current[key]));
            if (numInput) numInput.value = current[key];
        }
    }
}

function exportConfig() {
    const json = JSON.stringify(current, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'drift-config.json'; a.click();
    URL.revokeObjectURL(url);
    showStatus('Exported drift-config.json');
}

function importConfig() {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json';
    input.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            try {
                const parsed = JSON.parse(reader.result);
                for (const key of Object.keys(DEFAULTS)) {
                    if (key in parsed) current[key] = parsed[key];
                }
                updateUIFromCurrent();
                markChanged();
                showStatus('Imported ' + file.name + ' — click Apply to use');
            } catch (err) {
                showStatus('Error: invalid JSON — ' + err.message);
            }
        };
        reader.readAsText(file);
    });
    input.click();
}

function resetDefaults() {
    current = { ...DEFAULTS };
    updateUIFromCurrent();
    markChanged();
    showStatus('Reset to defaults — click Apply to use');
}

function showStatus(msg) {
    const el = document.getElementById('status');
    el.textContent = msg;
    setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 4000);
}

buildUI();
</script>
