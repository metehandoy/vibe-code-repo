<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drift Arrow - Dev Tuner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0014;
    color: #ccc;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 12px;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

#panel {
    width: 320px;
    min-width: 200px;
    max-width: 600px;
    height: 100vh;
    overflow-y: auto;
    background: #12081e;
    border-right: 1px solid #333;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
}

#panel::-webkit-scrollbar { width: 6px; }
#panel::-webkit-scrollbar-track { background: #12081e; }
#panel::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

#resize-handle {
    width: 6px;
    cursor: col-resize;
    background: #222;
    flex-shrink: 0;
    transition: background 0.15s;
}
#resize-handle:hover, #resize-handle.active {
    background: #ff00ff;
}

#game-container {
    flex: 1;
    position: relative;
    min-width: 0;
    min-height: 0;
}

#game-container iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* ---- Mobile: vertical stack ---- */
@media (max-width: 768px) {
    body { flex-direction: column; }

    #game-container { order: 1; flex: 1; }

    #resize-handle {
        order: 2;
        width: 100%;
        height: 10px;
        cursor: row-resize;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    /* Pill drag indicator */
    #resize-handle::after {
        content: '';
        display: block;
        width: 40px;
        height: 4px;
        background: #444;
        border-radius: 2px;
    }

    #panel {
        order: 3;
        width: 100%;
        height: 40vh;
        min-height: 44px;
        max-height: 85vh;
        border-right: none;
        border-top: 1px solid #333;
        transition: height 0.2s ease;
    }

    /* Collapse toggle button — only visible on mobile */
    #panel-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        padding: 2px 0 6px;
        flex-shrink: 0;
    }
    #panel-toggle-arrow { font-size: 14px; color: #ff00ff; }

    /* Hide scrollbar on panel when collapsed */
    #panel.collapsed { height: 44px; overflow: hidden; }
    #panel.collapsed #params { display: none; }
    #panel.collapsed .controls-hint { display: none; }
}

h2 {
    color: #ff00ff;
    font-size: 16px;
    margin: 0 0 6px 0;
    text-shadow: 0 0 10px #ff00ff;
}

.section {
    background: #1a0e2a;
    border: 1px solid #2a1a3a;
    border-radius: 4px;
    padding: 6px;
    margin-bottom: 4px;
}

.section-title {
    color: #00ffff;
    font-size: 11px;
    font-weight: bold;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    user-select: none;
}

.section-title:hover { color: #66ffff; }

.param-row {
    display: flex;
    align-items: center;
    margin: 2px 0;
    gap: 4px;
}

.param-row label {
    flex: 0 0 100px;
    font-size: 10px;
    color: #aaa;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
}

.param-row input[type="range"] {
    flex: 1;
    height: 14px;
    accent-color: #ff00ff;
    cursor: pointer;
    min-width: 40px;
}

.param-row input[type="number"] {
    width: 58px;
    flex: 0 0 58px;
    background: #0a0014;
    border: 1px solid #333;
    border-radius: 2px;
    color: #ffee00;
    font-family: inherit;
    font-size: 10px;
    font-weight: bold;
    padding: 2px 4px;
    text-align: right;
}
.param-row input[type="number"]:focus {
    border-color: #ff00ff;
    outline: none;
}
/* Hide number spinners */
.param-row input[type="number"]::-webkit-inner-spin-button,
.param-row input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
.param-row input[type="number"] { -moz-appearance: textfield; }

.btn-row {
    display: flex;
    gap: 4px;
    margin: 4px 0;
}

.btn {
    flex: 1;
    padding: 6px 4px;
    background: #2a1a4a;
    color: #fff;
    border: 1px solid #444;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
    font-size: 10px;
    font-weight: bold;
    text-transform: uppercase;
}

.btn:hover { background: #3a2a5a; }
.btn.apply { border-color: #ff00ff; color: #ff00ff; font-size: 12px; }
.btn.apply:hover { background: #4a2a6a; box-shadow: 0 0 8px #ff00ff44; }
.btn.export { border-color: #00ffa0; color: #00ffa0; }
.btn.import { border-color: #4488ff; color: #4488ff; }
.btn.reset { border-color: #ff3366; color: #ff3366; }
.btn.load { border-color: #ffaa00; color: #ffaa00; }

.changed { border-color: #ff00ff !important; }

#status {
    padding: 4px;
    font-size: 10px;
    color: #00ffa0;
    min-height: 18px;
}

.controls-hint {
    color: #666;
    font-size: 10px;
    padding: 4px;
    border-top: 1px solid #222;
    margin-top: auto;
}
</style>
</head>
<body>

<div id="panel">
    <!-- Mobile collapse toggle (hidden on desktop via CSS) -->
    <div id="panel-toggle" onclick="togglePanel()" style="display:none">
        <h2 style="margin:0">DRIFT ARROW DEV</h2>
        <span id="panel-toggle-arrow">▼</span>
    </div>
    <h2 id="panel-title">DRIFT ARROW DEV</h2>

    <div class="btn-row">
        <button class="btn apply" id="apply-btn" onclick="applyConfig()">APPLY CHANGES</button>
    </div>
    <div class="btn-row">
        <button class="btn export" onclick="exportConfig()">Export</button>
        <button class="btn import" onclick="importConfig()">Import</button>
        <button class="btn reset" onclick="resetDefaults()">Reset</button>
    </div>
    <div id="status"></div>

    <div id="params"></div>

    <div class="controls-hint">
        Click game area for keyboard input<br>
        A/D or Arrows: steer | Space: brake<br>
        Drag edge to resize panel
    </div>
</div>

<div id="resize-handle"></div>

<div id="game-container">
    <iframe id="game-frame" src="index.html"></iframe>
</div>

<script>
// Default values — must match index.html exactly
const DEFAULTS = {
    ARROW_SPEED: 3.5,
    STEER_RATE: 0.014,
    STEER_MAX: 0.045,
    GRIP: 0.025,
    REALIGN_RATE: 0.04,
    DRIFT_DRAG_EXP: 2.0,
    DRIFT_DRAG_SCALE: 0.008,
    ARROW_LENGTH: 22,
    ARROW_WIDTH: 10,
    BRAKE_DECEL: 0.02,
    BRAKE_MIN_SPEED: 0.05,
    SPEED_RECOVERY: 0.012,
    SPEED_RECOVERY_RELEASE: 0.06,
    TRACK_WIDTH: 140,
    MIN_TRACK_WIDTH: 38,
    SEGMENT_LENGTH: 12,
    LOOK_AHEAD: 120,
    LOOK_BEHIND: 100,
    OVERLAP_MARGIN: 15,
    DIFFICULTY_RAMP: 0.00012,
    METERS_PER_SEGMENT: 0.03,
    WANDER_WEIGHT: 1.0,
    WANDER_FREQUENCY: 0.08,
    WANDER_AMPLITUDE: 0.06,
    AVOIDANCE_WEIGHT: 3.0,
    AVOIDANCE_RADIUS: 500,
    RHYTHM_WEIGHT: 0.7,
    RHYTHM_FREQUENCY: 0.12,
    RHYTHM_AMPLITUDE: 0.04,
    EVENT_WEIGHT: 1.5,
    EVENT_INTENSITY: 0.10,
    EVENT_DECAY: 0.92,
    EVENT_INTERVAL_MIN: 15,
    EVENT_INTERVAL_MAX: 60,
    CENTERING_WEIGHT: 0.15,
    WIDTH_CURVATURE_COUPLING: 0.7,
    WIDTH_TRANSITION_RATE: 0.12,
    AGENT_STEER_RATE: 0.011,
    AGENT_STEER_MAX: 0.038,
    AGENT_GRIP: 0.030,
    OFFSET_FREQUENCY: 0.02,
    OFFSET_AMPLITUDE: 0.8,
    AGENT_MARGIN: 18,
    START_TIME: 30,
    TIME_TOKEN_VALUE: 3.5,
    TOKEN_RADIUS: 10,
    TOKEN_MIN_GAP: 25,
    TOKEN_SPAWN_CHANCE: 0.025,
    TOKEN_NO_SPAWN_ZONE: 40,
    HAZARD_RADIUS: 10,
    HAZARD_EFFECT_DUR: 180,
    HAZARD_MIN_GAP: 10,
    HAZARD_SPAWN_CHANCE: 0.02,
    HAZARD_NO_SPAWN_ZONE: 80,
    HAZARD_SLOW_MULT: 0.55,
    HAZARD_SPEED_MULT: 1.12,
};

const PARAM_SECTIONS = [
    { title: 'Arrow / Driving', params: [
        ['ARROW_SPEED', 'Speed', 1, 10, 0.1],
        ['STEER_RATE', 'Steer Rate', 0.002, 0.05, 0.001],
        ['STEER_MAX', 'Steer Max', 0.01, 0.15, 0.005],
        ['GRIP', 'Grip', 0.005, 0.1, 0.005],
        ['REALIGN_RATE', 'Realign Rate', 0.01, 0.15, 0.005],
        ['DRIFT_DRAG_EXP', 'Drift Drag Exp', 1, 4, 0.1],
        ['DRIFT_DRAG_SCALE', 'Drift Drag Scl', 0.001, 0.03, 0.001],
        ['ARROW_LENGTH', 'Arrow Length', 10, 40, 1],
        ['ARROW_WIDTH', 'Arrow Width', 4, 20, 1],
    ]},
    { title: 'Braking', params: [
        ['BRAKE_DECEL', 'Deceleration', 0.005, 0.1, 0.005],
        ['BRAKE_MIN_SPEED', 'Min Speed', 0, 0.5, 0.01],
    ]},
    { title: 'Speed Recovery', params: [
        ['SPEED_RECOVERY', 'Recovery Rate', 0.002, 0.05, 0.002],
        ['SPEED_RECOVERY_RELEASE', 'Release Burst', 0.01, 0.2, 0.01],
    ]},
    { title: 'Track Shape', params: [
        ['TRACK_WIDTH', 'Max Width', 60, 200, 5],
        ['MIN_TRACK_WIDTH', 'Min Width', 20, 100, 5],
        ['SEGMENT_LENGTH', 'Seg Length', 4, 30, 1],
        ['LOOK_AHEAD', 'Look Ahead', 40, 250, 10],
        ['LOOK_BEHIND', 'Look Behind', 30, 200, 10],
        ['OVERLAP_MARGIN', 'Overlap Margin', 0, 40, 1],
    ]},
    { title: 'Agent Steering', params: [
        ['WANDER_WEIGHT', 'Wander Weight', 0, 3, 0.05],
        ['WANDER_FREQUENCY', 'Wander Freq', 0.01, 0.3, 0.005],
        ['WANDER_AMPLITUDE', 'Wander Amp', 0.005, 0.2, 0.005],
        ['AVOIDANCE_WEIGHT', 'Avoid Weight', 0, 8, 0.25],
        ['AVOIDANCE_RADIUS', 'Avoid Radius', 100, 1200, 25],
        ['RHYTHM_WEIGHT', 'Rhythm Weight', 0, 2, 0.05],
        ['RHYTHM_FREQUENCY', 'Rhythm Freq', 0.02, 0.4, 0.01],
        ['RHYTHM_AMPLITUDE', 'Rhythm Amp', 0.005, 0.15, 0.005],
        ['EVENT_WEIGHT', 'Event Weight', 0, 4, 0.1],
        ['EVENT_INTENSITY', 'Event Intensity', 0.02, 0.25, 0.005],
        ['EVENT_DECAY', 'Event Decay', 0.7, 0.99, 0.01],
        ['EVENT_INTERVAL_MIN', 'Event Min Gap', 5, 60, 1],
        ['EVENT_INTERVAL_MAX', 'Event Max Gap', 20, 120, 5],
        ['CENTERING_WEIGHT', 'Center Weight', 0, 0.5, 0.01],
        ['WIDTH_CURVATURE_COUPLING', 'Width-Curv', 0, 1, 0.05],
        ['WIDTH_TRANSITION_RATE', 'Width Smooth', 0.02, 0.5, 0.02],
    ]},
    { title: 'Agent Physics', params: [
        ['AGENT_STEER_RATE', 'Steer Rate', 0.002, 0.03, 0.001],
        ['AGENT_STEER_MAX', 'Steer Max', 0.01, 0.1, 0.002],
        ['AGENT_GRIP', 'Grip', 0.005, 0.1, 0.005],
    ]},
    { title: 'Agent Offset', params: [
        ['OFFSET_FREQUENCY', 'Offset Freq', 0.005, 0.1, 0.005],
        ['OFFSET_AMPLITUDE', 'Offset Amp', 0, 1, 0.05],
        ['AGENT_MARGIN', 'Agent Margin', 5, 50, 1],
    ]},
    { title: 'Difficulty', params: [
        ['DIFFICULTY_RAMP', 'Ramp Speed', 0.00002, 0.0005, 0.00002],
        ['METERS_PER_SEGMENT', 'Meters/Seg', 0.01, 0.1, 0.005],
    ]},
    { title: 'Timer / Tokens', params: [
        ['START_TIME', 'Start Time (s)', 10, 120, 5],
        ['TIME_TOKEN_VALUE', 'Token Value (s)', 0.5, 10, 0.5],
        ['TOKEN_RADIUS', 'Token Radius', 5, 25, 1],
        ['TOKEN_MIN_GAP', 'Min Gap (segs)', 5, 60, 1],
        ['TOKEN_SPAWN_CHANCE', 'Spawn Chance', 0.005, 0.1, 0.005],
        ['TOKEN_NO_SPAWN_ZONE', 'No-Spawn Zone', 10, 100, 5],
    ]},
    { title: 'Hazards', params: [
        ['HAZARD_RADIUS', 'Radius', 5, 25, 1],
        ['HAZARD_EFFECT_DUR', 'Effect Dur (f)', 60, 600, 30],
        ['HAZARD_MIN_GAP', 'Min Gap (segs)', 3, 30, 1],
        ['HAZARD_SPAWN_CHANCE', 'Spawn Chance', 0.005, 0.1, 0.005],
        ['HAZARD_NO_SPAWN_ZONE', 'No-Spawn Zone', 20, 200, 10],
        ['HAZARD_SLOW_MULT', 'Slow Mult', 0.2, 0.9, 0.05],
        ['HAZARD_SPEED_MULT', 'Speed Mult', 1.02, 1.5, 0.02],
    ]},
];

// Current slider values (not yet applied)
let current = { ...DEFAULTS };
// Last applied values (what the game is actually using)
let applied = { ...DEFAULTS };
let hasUnapplied = false;

// Load saved config from localStorage
try {
    const saved = localStorage.getItem('driftArrowDevConfig');
    if (saved) {
        const parsed = JSON.parse(saved);
        Object.assign(current, parsed);
        Object.assign(applied, parsed);
    }
} catch (e) {}

function buildUI() {
    const container = document.getElementById('params');
    container.innerHTML = '';

    for (const section of PARAM_SECTIONS) {
        const div = document.createElement('div');
        div.className = 'section';

        const title = document.createElement('div');
        title.className = 'section-title';
        title.textContent = section.title;
        const body = document.createElement('div');
        body.className = 'section-body';

        title.addEventListener('click', () => {
            body.style.display = body.style.display === 'none' ? '' : 'none';
        });

        div.appendChild(title);

        for (const [key, label, min, max, step] of section.params) {
            const row = document.createElement('div');
            row.className = 'param-row';

            const lbl = document.createElement('label');
            lbl.textContent = label;
            lbl.title = key;

            const slider = document.createElement('input');
            slider.type = 'range';
            slider.min = min;
            slider.max = max;
            slider.step = step;
            slider.value = current[key];
            slider.id = 'slider-' + key;

            const numInput = document.createElement('input');
            numInput.type = 'number';
            numInput.min = min;
            numInput.max = max;
            numInput.step = step;
            numInput.value = current[key];
            numInput.id = 'num-' + key;

            // Slider changes update number input
            slider.addEventListener('input', () => {
                const v = parseFloat(slider.value);
                current[key] = v;
                numInput.value = v;
                markChanged();
            });

            // Number input changes update slider
            numInput.addEventListener('input', () => {
                const v = parseFloat(numInput.value);
                if (!isNaN(v)) {
                    current[key] = v;
                    slider.value = Math.max(min, Math.min(max, v));
                    markChanged();
                }
            });

            // Allow typing values outside slider range
            numInput.addEventListener('change', () => {
                const v = parseFloat(numInput.value);
                if (!isNaN(v)) {
                    current[key] = v;
                    // Clamp slider but keep typed value
                    slider.value = Math.max(min, Math.min(max, v));
                    markChanged();
                }
            });

            row.appendChild(lbl);
            row.appendChild(slider);
            row.appendChild(numInput);
            body.appendChild(row);
        }

        div.appendChild(body);
        container.appendChild(div);
    }
}

function markChanged() {
    hasUnapplied = true;
    document.getElementById('apply-btn').classList.add('changed');
    autoSave();
}

function applyConfig() {
    // Reload the game iframe with config passed via URL hash
    // This works on file:// and http:// without cross-origin issues
    const iframe = document.getElementById('game-frame');
    const hash = '#' + encodeURIComponent(JSON.stringify(current));
    iframe.src = 'index.html' + hash;
    applied = { ...current };
    hasUnapplied = false;
    document.getElementById('apply-btn').classList.remove('changed');
    showStatus('Game reloaded with new config');
}

function autoSave() {
    localStorage.setItem('driftArrowDevConfig', JSON.stringify(current));
}

function updateUIFromCurrent() {
    for (const section of PARAM_SECTIONS) {
        for (const [key, , min, max, step] of section.params) {
            const slider = document.getElementById('slider-' + key);
            const numInput = document.getElementById('num-' + key);
            if (slider) {
                slider.value = Math.max(min, Math.min(max, current[key]));
            }
            if (numInput) {
                numInput.value = current[key];
            }
        }
    }
}

function exportConfig() {
    const json = JSON.stringify(current, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'drift-config.json';
    a.click();
    URL.revokeObjectURL(url);
    showStatus('Config exported as drift-config.json');
}

function importConfig() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            try {
                const parsed = JSON.parse(reader.result);
                for (const key of Object.keys(DEFAULTS)) {
                    if (key in parsed) current[key] = parsed[key];
                }
                updateUIFromCurrent();
                markChanged();
                showStatus('Imported ' + file.name + ' — click Apply to use');
            } catch (err) {
                showStatus('Error: invalid JSON - ' + err.message);
            }
        };
        reader.readAsText(file);
    });
    input.click();
}

function resetDefaults() {
    current = { ...DEFAULTS };
    updateUIFromCurrent();
    markChanged();
    showStatus('Reset to defaults — click Apply to use');
}

function showStatus(msg) {
    const el = document.getElementById('status');
    el.textContent = msg;
    setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 4000);
}

// ============================================================
// KEYBOARD FORWARDING
// ============================================================
// Forward keyboard events from the parent page into the iframe
// so the game receives input even when panel has focus
const GAME_KEYS = new Set(['ArrowLeft', 'ArrowRight', 'KeyA', 'KeyD', 'Space']);

document.addEventListener('keydown', (e) => {
    if (GAME_KEYS.has(e.code)) {
        // Don't forward if user is typing in a number input
        if (e.target.tagName === 'INPUT') return;
        e.preventDefault();
        forwardKeyEvent('keydown', e);
    }
});

document.addEventListener('keyup', (e) => {
    if (GAME_KEYS.has(e.code)) {
        if (e.target.tagName === 'INPUT') return;
        forwardKeyEvent('keyup', e);
    }
});

function forwardKeyEvent(type, original) {
    const iframe = document.getElementById('game-frame');
    try {
        const evt = new KeyboardEvent(type, {
            code: original.code,
            key: original.key,
            bubbles: true,
            cancelable: true,
        });
        iframe.contentDocument.dispatchEvent(evt);
    } catch (e) { /* cross-origin */ }
}

// ============================================================
// RESIZABLE PANEL
// ============================================================
const handle = document.getElementById('resize-handle');
const panel = document.getElementById('panel');
let resizing = false;

function isMobile() { return window.innerWidth <= 768; }

// Show/hide mobile toggle button based on viewport
function updateMobileUI() {
    const toggle = document.getElementById('panel-toggle');
    const title  = document.getElementById('panel-title');
    if (isMobile()) {
        toggle.style.display = 'flex';
        title.style.display  = 'none';
    } else {
        toggle.style.display = 'none';
        title.style.display  = '';
        panel.classList.remove('collapsed');
    }
}
updateMobileUI();
window.addEventListener('resize', updateMobileUI);

function togglePanel() {
    const arrow = document.getElementById('panel-toggle-arrow');
    panel.classList.toggle('collapsed');
    arrow.textContent = panel.classList.contains('collapsed') ? '▲' : '▼';
}

// ---- Desktop: horizontal drag ----
handle.addEventListener('mousedown', (e) => {
    if (isMobile()) return;
    e.preventDefault();
    resizing = true;
    handle.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.getElementById('game-frame').style.pointerEvents = 'none';
});

document.addEventListener('mousemove', (e) => {
    if (!resizing || isMobile()) return;
    const newWidth = Math.max(200, Math.min(600, e.clientX));
    panel.style.width = newWidth + 'px';
});

document.addEventListener('mouseup', () => {
    if (!resizing) return;
    resizing = false;
    handle.classList.remove('active');
    document.body.style.cursor = '';
    document.getElementById('game-frame').style.pointerEvents = '';
});

// ---- Mobile: vertical drag ----
let touchStartY = 0;
let touchStartH = 0;

handle.addEventListener('touchstart', (e) => {
    if (!isMobile()) return;
    panel.classList.remove('collapsed');
    touchStartY = e.touches[0].clientY;
    touchStartH = panel.offsetHeight;
    handle.classList.add('active');
    document.getElementById('game-frame').style.pointerEvents = 'none';
}, { passive: true });

handle.addEventListener('touchmove', (e) => {
    if (!isMobile()) return;
    e.preventDefault();
    const dy = touchStartY - e.touches[0].clientY; // drag up = grow panel
    const newH = Math.max(44, Math.min(window.innerHeight * 0.85, touchStartH + dy));
    panel.style.height = newH + 'px';
    document.getElementById('panel-toggle-arrow').textContent = newH < 80 ? '▲' : '▼';
}, { passive: false });

handle.addEventListener('touchend', () => {
    handle.classList.remove('active');
    document.getElementById('game-frame').style.pointerEvents = '';
    // Snap to collapsed if dragged very small
    if (panel.offsetHeight < 80) {
        panel.classList.add('collapsed');
        panel.style.height = '';
    }
});

// ============================================================
// IFRAME LOAD
// ============================================================
const iframe = document.getElementById('game-frame');

// On first load, apply saved config if it differs from defaults
const hasCustomConfig = Object.keys(DEFAULTS).some(k => current[k] !== DEFAULTS[k]);
if (hasCustomConfig) {
    const hash = '#' + encodeURIComponent(JSON.stringify(current));
    iframe.src = 'index.html' + hash;
}

iframe.addEventListener('load', () => {
    applied = { ...current };
    showStatus('Connected to game');
});

buildUI();
</script>

</body>
</html>
